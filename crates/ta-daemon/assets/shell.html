<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ta shell</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-input: #16213e;
  --fg: #e0e0e0;
  --fg-dim: #888;
  --fg-cmd: #00d2ff;
  --fg-agent: #f0f0f0;
  --fg-stderr: #ff6b6b;
  --fg-event: #ffd93d;
  --fg-info: #6bcb77;
  --fg-notify: #ff9f43;
  --fg-tail: #a78bfa;
  --fg-progress: #555;
  --fg-progress-text: #777;
  --border: #333;
  --accent: #4361ee;
  /* Cursor style — configurable via daemon.toml [shell.ui] (v0.11.7 item 6) */
  --cursor-color: #ffffff;
  --cursor-style: block;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 14px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
}
#output {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  scroll-behavior: smooth;
}
#output .line { white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
#output .line.cmd { color: var(--fg-cmd); }
#output .line.agent { color: var(--fg-agent); }
#output .line.stderr { color: var(--fg-stderr); }
#output .line.event { color: var(--fg-event); }
#output .line.info { color: var(--fg-info); }
#output .line.notify { color: var(--fg-notify); font-weight: bold; }
#output .line.tail { color: var(--fg-tail); }
#output .line.separator { color: var(--fg-dim); border-top: 1px solid var(--border); padding-top: 4px; margin-top: 4px; }
#output .line .ts { color: var(--fg-dim); font-size: 12px; margin-right: 6px; user-select: none; }
/* Progress lines: dimmed stderr shown as "thinking" indicators (v0.11.5 item 9) */
#output .line.progress {
  color: var(--fg-progress-text);
  font-size: 12px;
  opacity: 0.7;
  margin-left: 16px;
}
#output .line.progress.collapsed { display: none; }
#input-bar {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg-input);
  padding: 8px 12px;
  align-items: center;
  gap: 8px;
}
#prompt { color: var(--fg-cmd); white-space: nowrap; user-select: none; }
#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: inherit;
  font-size: inherit;
  caret-color: var(--cursor-color);
}
#status-bar {
  display: flex;
  gap: 12px;
  padding: 4px 12px;
  background: #0f0f23;
  color: var(--fg-dim);
  font-size: 12px;
  border-top: 1px solid var(--border);
  user-select: none;
  align-items: center;
  flex-wrap: wrap;
}
#status-bar .connected { color: var(--fg-info); }
#status-bar .disconnected { color: var(--fg-stderr); }
#status-bar .pending { color: var(--fg-notify); }
#status-bar .tailing { color: var(--fg-tail); }
#status-bar .parallel-session { color: var(--fg-cmd); cursor: pointer; padding: 2px 5px; border: 1px solid var(--border); border-radius: 3px; font-size: 11px; }
#status-bar .parallel-session.active { border-color: var(--accent); color: var(--fg); }
.spinner { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Working indicator with spinner (v0.11.7 items 1-2) */
#thinking-indicator {
  color: var(--fg-progress-text);
  font-size: 12px;
  font-style: italic;
  padding: 2px 12px;
  display: none;
}
#thinking-indicator.visible { display: block; }
/* No-heartbeat alert: turn red when no heartbeat received within threshold */
#thinking-indicator.no-heartbeat { color: var(--fg-stderr); font-style: normal; }
</style>
</head>
<body>
<div id="output"></div>
<div id="thinking-indicator" aria-live="polite"></div>
<div id="input-bar">
  <span id="prompt">ta&gt;</span>
  <input id="input" type="text" autocomplete="off" autofocus placeholder="Type a command or message...">
</div>
<div id="status-bar">
  <span id="conn-status" class="disconnected">connecting...</span>
  <span id="project-info"></span>
  <span id="agent-framework"></span>
  <span id="agent-info"></span>
  <span id="tail-info"></span>
  <span id="pending-info"></span>
  <span id="parallel-sessions-info"></span>
  <span style="flex:1"></span>
  <span id="version-info"></span>
</div>

<script>
(function() {
  'use strict';

  const output = document.getElementById('output');
  const input = document.getElementById('input');
  const connStatus = document.getElementById('conn-status');
  const projectInfo = document.getElementById('project-info');
  const agentFramework = document.getElementById('agent-framework');
  const agentInfo = document.getElementById('agent-info');
  const tailInfo = document.getElementById('tail-info');
  const pendingInfo = document.getElementById('pending-info');
  const versionInfo = document.getElementById('version-info');
  const parallelSessionsInfo = document.getElementById('parallel-sessions-info');
  const thinkingIndicator = document.getElementById('thinking-indicator');

  const BASE = window.location.origin;
  let history = [];
  let historyIdx = -1;
  let savedInput = '';
  let autoScroll = true;
  let sseEvents = null;
  let sseGoals = {};  // Map of goalId -> { sse: EventSource, label: string, progressGroupId: string }
  let statusPoll = null;
  let pendingRequests = 0;

  // ── Parallel sessions (v0.11.5 items 13-16) ──────────────────
  // Map of tag -> { session_id, label, created_at, last_active }
  let parallelSessions = {};
  // Currently active parallel session tag (null = default session)
  let activeParallelTag = null;
  let parallelTagCounter = 0;

  // ── Thinking indicator tracking (v0.11.5 item 11) ────────────
  // Map of requestId -> { latestProgressLine, progressGroupEl, progressLines: [] }
  let activeRequests = {};

  // ── Working indicator / spinner state (v0.11.7 items 1-2) ────
  // Spinner characters (Braille pattern — smooth rotation effect)
  const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
  let workingState = {
    active: false,
    startTime: null,
    lastHeartbeat: null,
    spinnerIdx: 0,
    spinnerTimer: null,
    noHeartbeatTimer: null,
    noHeartbeatAlertSecs: 30,   // updated from /api/status
    label: '',
    inAlert: false,
  };

  // Heartbeat line patterns (intercept from stream, don't display as output)
  const HEARTBEAT_PATTERN = /\[heartbeat\]|\bstill running\b.*elapsed|\belapsed\b.*\bstill running\b/i;

  function startWorkingIndicator(label) {
    workingState.active = true;
    workingState.startTime = Date.now();
    workingState.lastHeartbeat = Date.now();
    workingState.label = label || '';
    workingState.inAlert = false;
    workingState.spinnerIdx = 0;

    // Spinner: update every 120ms
    if (workingState.spinnerTimer) clearInterval(workingState.spinnerTimer);
    workingState.spinnerTimer = setInterval(() => {
      workingState.spinnerIdx = (workingState.spinnerIdx + 1) % SPINNER_FRAMES.length;
      renderWorkingIndicator();
    }, 120);

    // No-heartbeat alert: check every second
    if (workingState.noHeartbeatTimer) clearInterval(workingState.noHeartbeatTimer);
    workingState.noHeartbeatTimer = setInterval(() => {
      if (!workingState.active) return;
      const secsSinceHb = (Date.now() - workingState.lastHeartbeat) / 1000;
      const wasAlert = workingState.inAlert;
      workingState.inAlert = secsSinceHb >= workingState.noHeartbeatAlertSecs;
      if (workingState.inAlert !== wasAlert) renderWorkingIndicator();
    }, 1000);

    renderWorkingIndicator();
  }

  function stopWorkingIndicator(finalMsg) {
    workingState.active = false;
    if (workingState.spinnerTimer) { clearInterval(workingState.spinnerTimer); workingState.spinnerTimer = null; }
    if (workingState.noHeartbeatTimer) { clearInterval(workingState.noHeartbeatTimer); workingState.noHeartbeatTimer = null; }
    thinkingIndicator.textContent = '';
    thinkingIndicator.classList.remove('visible', 'no-heartbeat');
    if (finalMsg) appendLine(finalMsg, 'info');
  }

  function onHeartbeat(elapsedSecs) {
    workingState.lastHeartbeat = Date.now();
    workingState.inAlert = false;
    // Optionally update with the elapsed from the heartbeat message
    renderWorkingIndicator(elapsedSecs);
  }

  function renderWorkingIndicator(overrideElapsed) {
    if (!workingState.active) return;
    const spinner = SPINNER_FRAMES[workingState.spinnerIdx];
    const elapsed = overrideElapsed != null
      ? overrideElapsed
      : Math.floor((Date.now() - workingState.startTime) / 1000);
    const elapsedStr = formatDuration(elapsed);

    if (workingState.inAlert) {
      thinkingIndicator.textContent =
        'Agent is working \u26a0 (' + elapsedStr + ' elapsed — no heartbeat)';
      thinkingIndicator.classList.add('visible', 'no-heartbeat');
    } else {
      thinkingIndicator.textContent =
        'Agent is working ' + spinner + ' (' + elapsedStr + ' elapsed)';
      thinkingIndicator.classList.add('visible');
      thinkingIndicator.classList.remove('no-heartbeat');
    }
  }

  // ── Timestamp ────────────────────────────────────────────────

  function ts() {
    const d = new Date();
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return h + ':' + m + ':' + s;
  }

  function shortId(id) {
    return (id || '').substring(0, 8);
  }

  function formatDuration(secs) {
    if (!secs) return '';
    if (secs < 60) return secs + 's';
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return m + 'm' + (s > 0 ? s + 's' : '');
  }

  // ── Output ──────────────────────────────────────────────────

  function appendLine(text, cls, showTimestamp) {
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    if (showTimestamp !== false) {
      const span = document.createElement('span');
      span.className = 'ts';
      span.textContent = ts();
      div.appendChild(span);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }
    output.appendChild(div);
    if (autoScroll) {
      requestAnimationFrame(() => output.scrollTop = output.scrollHeight);
    }
    return div;
  }

  // Track scroll position for auto-scroll
  output.addEventListener('scroll', () => {
    const atBottom = output.scrollHeight - output.scrollTop - output.clientHeight < 40;
    autoScroll = atBottom;
  });

  // ── Pending requests tracking ─────────────────────────────

  function updatePending(delta) {
    pendingRequests = Math.max(0, pendingRequests + delta);
    if (pendingRequests > 0) {
      pendingInfo.textContent = pendingRequests + ' pending';
      pendingInfo.className = 'pending';
    } else {
      pendingInfo.textContent = '';
      pendingInfo.className = '';
    }
    updateThinkingIndicator();
  }

  // ── Thinking indicator (v0.11.5 item 11 / v0.11.7 items 1-2) ──────────────

  function updateThinkingIndicator(latestProgress) {
    // The new spinner-based working indicator replaces the old static text.
    // This function is kept for backward-compat call sites; the spinner state
    // is managed by startWorkingIndicator / stopWorkingIndicator.
    if (pendingRequests <= 0 && workingState.active) {
      stopWorkingIndicator();
    }
  }

  // ── Progress lines (v0.11.5 items 9-10) ─────────────────────

  // Known progress patterns from Claude Code stderr output
  const PROGRESS_PATTERNS = [
    /^Reading /,
    /^Searching /,
    /^Running /,
    /^Writing /,
    /^Editing /,
    /^Creating /,
    /^Checking /,
    /^Analyzing /,
    /^Looking /,
    /^Found /,
    /^Tool:/,
    /^\[tool:/i,
    /^Bash\(/,
    /^Read\(/,
    /^Edit\(/,
    /^Write\(/,
    /^Glob\(/,
    /^Grep\(/,
  ];

  function isProgressLine(line) {
    return PROGRESS_PATTERNS.some(p => p.test(line));
  }

  // Append a progress (dimmed stderr) line, optionally into a group container.
  // Returns the created element.
  function appendProgressLine(text, groupId) {
    const div = document.createElement('div');
    div.className = 'line progress';
    div.dataset.group = groupId || '';
    div.textContent = '  ⋯ ' + text;
    output.appendChild(div);
    if (autoScroll) {
      requestAnimationFrame(() => output.scrollTop = output.scrollHeight);
    }
    return div;
  }

  // Collapse all progress lines for a given group (v0.11.5 item 12)
  function collapseProgressLines(groupId) {
    if (!groupId) return;
    const lines = output.querySelectorAll('.line.progress[data-group="' + groupId + '"]');
    lines.forEach(el => el.classList.add('collapsed'));
  }

  // ── Tail status bar tracking ──────────────────────────────

  function updateTailStatus() {
    const ids = Object.keys(sseGoals);
    if (ids.length === 0) {
      tailInfo.textContent = '';
      tailInfo.className = '';
    } else if (ids.length === 1) {
      const entry = sseGoals[ids[0]];
      tailInfo.textContent = 'tailing ' + (entry.label || shortId(ids[0]));
      tailInfo.className = 'tailing';
    } else {
      tailInfo.textContent = 'tailing ' + ids.length + ' streams';
      tailInfo.className = 'tailing';
    }
  }

  // ── Parallel session status bar (v0.11.5 item 15) ────────────

  function updateParallelSessionsStatus() {
    parallelSessionsInfo.innerHTML = '';
    const tags = Object.keys(parallelSessions);
    if (tags.length === 0) return;

    for (const tag of tags) {
      const s = parallelSessions[tag];
      const span = document.createElement('span');
      span.className = 'parallel-session' + (activeParallelTag === tag ? ' active' : '');
      span.textContent = '@' + tag;
      span.title = 'Session ' + s.session_id + ' — click to switch';
      span.addEventListener('click', () => {
        switchParallelSession(tag);
      });
      parallelSessionsInfo.appendChild(span);
    }

    // Show current session indicator in prompt
    const prompt = document.getElementById('prompt');
    if (activeParallelTag) {
      prompt.textContent = 'ta[@' + activeParallelTag + ']>';
    } else {
      prompt.textContent = 'ta>';
    }
  }

  function switchParallelSession(tag) {
    if (tag === null || tag === 'default') {
      activeParallelTag = null;
    } else if (parallelSessions[tag]) {
      activeParallelTag = tag;
    }
    updateParallelSessionsStatus();
    const name = activeParallelTag ? '@' + activeParallelTag : 'default session';
    appendLine('Switched to ' + name, 'info');
  }

  // ── Client-side commands ──────────────────────────────────

  function handleClientCommand(text) {
    // :tail <id> — attach to a goal's output stream
    const tailMatch = text.match(/^:tail\s+(\S+)/);
    if (tailMatch) {
      const goalId = tailMatch[1];
      appendLine('tailing output for ' + shortId(goalId) + '...', 'tail');
      tailGoalOutput(goalId, shortId(goalId), false, goalId);
      updatePending(+1);
      startWorkingIndicator(shortId(goalId));
      return true;
    }

    // :untail [id] — detach from goal output stream(s)
    const untailMatch = text.match(/^:untail(?:\s+(\S+))?/);
    if (untailMatch) {
      const goalId = untailMatch[1];
      if (goalId) {
        // Untail specific goal (match by prefix)
        const matchedId = Object.keys(sseGoals).find(id => id.startsWith(goalId));
        if (matchedId) {
          sseGoals[matchedId].sse.close();
          delete sseGoals[matchedId];
          appendLine('stopped tailing ' + shortId(matchedId), 'tail');
          updatePending(-1);
        } else {
          appendLine('not tailing ' + shortId(goalId), 'info');
        }
      } else {
        // Untail all
        const count = Object.keys(sseGoals).length;
        for (const id of Object.keys(sseGoals)) {
          sseGoals[id].sse.close();
          delete sseGoals[id];
          updatePending(-1);
        }
        stopWorkingIndicator();
        appendLine('stopped tailing ' + count + ' stream(s)', 'tail');
      }
      updateTailStatus();
      return true;
    }

    // :tails — list active tails
    if (text === ':tails') {
      const ids = Object.keys(sseGoals);
      if (ids.length === 0) {
        appendLine('no active tails', 'info');
      } else {
        appendLine('active tails:', 'tail');
        for (const id of ids) {
          const entry = sseGoals[id];
          appendLine('  ' + shortId(id) + ' — ' + (entry.label || '(unlabeled)'), 'tail');
        }
      }
      return true;
    }

    // /parallel — spawn a new parallel agent session (v0.11.5 item 13)
    if (text === '/parallel' || text.startsWith('/parallel ')) {
      spawnParallelSession();
      return true;
    }

    // /switch <tag> — switch active parallel session
    const switchMatch = text.match(/^\/switch\s+(@?\S+)/);
    if (switchMatch) {
      const tag = switchMatch[1].replace(/^@/, '');
      if (tag === 'default' || tag === 'main') {
        switchParallelSession(null);
      } else if (parallelSessions[tag]) {
        switchParallelSession(tag);
      } else {
        appendLine('Unknown session tag: @' + tag + '. Use /sessions to list active sessions.', 'info');
      }
      return true;
    }

    // /close [tag] — close a parallel session (v0.11.5 item 16)
    const closeMatch = text.match(/^\/close(?:\s+(@?\S+))?/);
    if (closeMatch) {
      const rawTag = closeMatch[1];
      const tag = rawTag ? rawTag.replace(/^@/, '') : activeParallelTag;
      if (!tag) {
        appendLine('No active parallel session to close. Use /close @<tag> to specify one.', 'info');
        return true;
      }
      if (parallelSessions[tag]) {
        closeParallelSession(tag);
      } else {
        appendLine('Unknown session tag: @' + tag, 'info');
      }
      return true;
    }

    // /sessions — list parallel sessions
    if (text === '/sessions') {
      const tags = Object.keys(parallelSessions);
      if (tags.length === 0) {
        appendLine('No parallel sessions. Use /parallel to start one.', 'info');
      } else {
        appendLine('Parallel sessions:', 'info');
        for (const tag of tags) {
          const s = parallelSessions[tag];
          const active = activeParallelTag === tag ? ' [active]' : '';
          appendLine('  @' + tag + ' — ' + s.session_id + active, 'info');
        }
        appendLine('Use @<tag> prefix to address a session, /switch @<tag> to set default, /close @<tag> to end.', 'info');
      }
      return true;
    }

    // :help — show available client commands
    if (text === ':help') {
      appendLine('Client commands:', 'info');
      appendLine('  :tail <id>       — attach to a goal/request output stream', 'info');
      appendLine('  :untail [id]     — detach from stream(s)', 'info');
      appendLine('  :tails           — list active tails', 'info');
      appendLine('  :help            — show this help', 'info');
      appendLine('  Ctrl+L           — clear output', 'info');
      appendLine('', 'info');
      appendLine('Parallel session commands (v0.11.5):', 'info');
      appendLine('  /parallel        — spawn a new independent agent session', 'info');
      appendLine('  /sessions        — list active parallel sessions', 'info');
      appendLine('  /switch @<tag>   — set active session for input routing', 'info');
      appendLine('  /close [@<tag>]  — close a parallel session', 'info');
      appendLine('  @<tag> <message> — send a message to a specific session', 'info');
      appendLine('', 'info');
      appendLine('Shell shortcuts: approve, deny, view, apply, status, plan, goals, drafts', 'info');
      appendLine('Commands: ta <cmd>, git <cmd>, !<shell cmd>', 'info');
      appendLine('Everything else is sent to the QA agent.', 'info');
      return true;
    }

    return false;
  }

  // ── Parallel session management (v0.11.5 items 13-16) ─────────

  async function spawnParallelSession() {
    // Check session limit before spawning (v0.11.5 item 16)
    const activeCount = Object.keys(parallelSessions).length;
    if (activeCount >= maxParallelSessions) {
      appendLine(
        'Maximum parallel sessions (' + maxParallelSessions + ') reached. ' +
        'Use /close @<tag> to end one first.',
        'info'
      );
      return;
    }

    parallelTagCounter++;
    const tag = 'p' + parallelTagCounter;
    appendLine('Spawning parallel session @' + tag + '...', 'tail');

    try {
      const resp = await fetch(BASE + '/api/agent/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: null }), // use default agent
      });
      if (!resp.ok) {
        const err = await resp.text();
        appendLine('Failed to spawn parallel session: ' + err, 'stderr');
        parallelTagCounter--;
        return;
      }
      const data = await resp.json();
      parallelSessions[tag] = {
        session_id: data.session_id,
        label: '@' + tag,
        created_at: new Date(),
        last_active: new Date(),
      };
      activeParallelTag = tag;
      updateParallelSessionsStatus();
      appendLine(
        'Parallel session @' + tag + ' ready (' + data.session_id + '). ' +
        'Type @' + tag + ' <message> or use /switch @' + tag + ' to set as default.',
        'notify'
      );
    } catch (err) {
      appendLine('Error spawning parallel session: ' + err.message, 'stderr');
      parallelTagCounter--;
    }
  }

  function closeParallelSession(tag) {
    const s = parallelSessions[tag];
    if (!s) return;

    fetch(BASE + '/api/agent/' + encodeURIComponent(s.session_id), { method: 'DELETE' })
      .catch(() => {}); // best-effort

    delete parallelSessions[tag];
    if (activeParallelTag === tag) {
      activeParallelTag = null;
    }
    updateParallelSessionsStatus();
    appendLine('Closed parallel session @' + tag, 'info');
  }

  // Idle timeout cleanup for parallel sessions (v0.11.5 item 16).
  // Check every 60s; close sessions idle > parallelIdleMs (daemon-configurable, default: 30 min).
  // Updated from /api/status on first poll.
  let parallelIdleMs = 30 * 60 * 1000;
  let maxParallelSessions = 3;
  setInterval(() => {
    const now = new Date();
    for (const tag of Object.keys(parallelSessions)) {
      const s = parallelSessions[tag];
      if (now - s.last_active > parallelIdleMs) {
        appendLine('Parallel session @' + tag + ' closed after idle timeout.', 'info');
        closeParallelSession(tag);
      }
    }
  }, 60000);

  // ── @tag routing for parallel sessions ────────────────────────

  // Returns { tag, prompt } if the text is @<tag> prefixed, else null.
  function parseParallelTarget(text) {
    const m = text.match(/^@(\S+)\s+([\s\S]+)/);
    if (m) {
      const tag = m[1];
      if (parallelSessions[tag]) {
        return { tag, prompt: m[2] };
      }
    }
    return null;
  }

  // ── Input ───────────────────────────────────────────────────

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      historyIdx = -1;

      if (history[history.length - 1] !== text) {
        history.push(text);
      }

      appendLine((activeParallelTag ? 'ta[@' + activeParallelTag + ']> ' : 'ta> ') + text, 'cmd');

      // Try client-side commands first (: or / prefix)
      if ((text.startsWith(':') || text.startsWith('/')) && handleClientCommand(text)) {
        return;
      }

      // Check for @tag routing
      const parallelTarget = parseParallelTarget(text);
      if (parallelTarget) {
        const session = parallelSessions[parallelTarget.tag];
        if (session) {
          session.last_active = new Date();
          sendInput(parallelTarget.prompt, session.session_id);
          return;
        }
      }

      // Route to active parallel session if set
      const sessionId = activeParallelTag && parallelSessions[activeParallelTag]
        ? parallelSessions[activeParallelTag].session_id
        : null;

      if (sessionId) {
        parallelSessions[activeParallelTag].last_active = new Date();
      }

      sendInput(text, sessionId);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIdx === -1) {
        savedInput = input.value;
        historyIdx = history.length - 1;
      } else if (historyIdx > 0) {
        historyIdx--;
      }
      if (historyIdx >= 0 && historyIdx < history.length) {
        input.value = history[historyIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx === -1) return;
      historyIdx++;
      if (historyIdx >= history.length) {
        historyIdx = -1;
        input.value = savedInput;
      } else {
        input.value = history[historyIdx];
      }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      output.innerHTML = '';
    }
  });

  // Cursor-aware paste (v0.14.7.1 item 2):
  // - If the input is focused, insert at the current cursor/selection position.
  // - If the input is not focused, focus it and append at end.
  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (!text) return;
    const safe = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
      .replace(/\t/g, '    ').replace(/^\n+|\n+$/g, '');
    if (document.activeElement === input) {
      // Input is focused — insert at current cursor position.
      const start = input.selectionStart ?? input.value.length;
      const endSel = input.selectionEnd ?? input.value.length;
      input.value = input.value.slice(0, start) + safe + input.value.slice(endSel);
      const newPos = start + safe.length;
      input.setSelectionRange(newPos, newPos);
    } else {
      // Input not focused — focus and append at end.
      input.focus();
      const end = input.value.length;
      input.setSelectionRange(end, end);
      document.execCommand('insertText', false, safe);
      const newEnd = input.value.length;
      input.setSelectionRange(newEnd, newEnd);
    }
  });

  // Keep input focused
  document.addEventListener('click', () => {
    if (window.getSelection().toString()) return;
    input.focus();
  });

  // ── API ─────────────────────────────────────────────────────

  async function sendInput(text, sessionId) {
    updatePending(+1);
    startWorkingIndicator('');
    try {
      const body = { text };
      if (sessionId) body.session_id = sessionId;

      const resp = await fetch(BASE + '/api/input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await resp.json();

      if (data.error) {
        appendLine('Error: ' + data.error, 'stderr');
        updatePending(-1);
        stopWorkingIndicator();
        return;
      }

      // Agent response: AskResponse shape {session_id, response, request_id, status}
      if (data.request_id) {
        // Don't call stopWorkingIndicator — spinner stays active until stream ends
        appendLine('agent working — tailing output (' + shortId(data.request_id) + ')...', 'tail');
        tailGoalOutput(data.request_id, 'agent request', true /* is agent request */);
        return; // pending count and spinner decremented when stream ends
      }

      // Command response: CmdResponse shape {exit_code, stdout, stderr, background_key?}
      if (data.exit_code !== undefined) {
        // Item 3: auto-tail background commands immediately (v0.11.7)
        if (data.background_key) {
          const bkey = data.background_key;
          appendLine('Auto-tailing output for ' + bkey + '...', 'tail');
          tailGoalOutput(bkey, bkey, false /* not an agent Q&A request */);
          // pendingRequests and spinner stay active for background tail duration
          // (don't decrement here — tailGoalOutput done-handler will decrement)
          return;
        }
        if (data.stdout) appendLine(data.stdout, 'agent');
        if (data.stderr) appendLine(data.stderr, 'stderr');
        if (data.exit_code !== 0) {
          appendLine('[exit ' + data.exit_code + ']', 'info');
        }
        updatePending(-1);
        stopWorkingIndicator();
        return;
      }

      // Agent response with inline text (no streaming)
      if (data.response) {
        appendLine(data.response, 'agent');
        updatePending(-1);
        stopWorkingIndicator();
        return;
      }

      // Fallback: show raw JSON
      appendLine(JSON.stringify(data, null, 2), 'info');
      updatePending(-1);
      stopWorkingIndicator();
    } catch (err) {
      appendLine('Error: ' + err.message, 'stderr');
      updatePending(-1);
      stopWorkingIndicator();
    }
  }

  // ── Goal Output SSE Stream ──────────────────────────────────

  // isAgentRequest: true means this is a Q&A request (show progress as thinking).
  // commandLabel: human-readable name for the process (used in final status line).
  function tailGoalOutput(goalId, label, isAgentRequest, commandLabel) {
    // Support multiple concurrent streams; close any existing stream for this key
    if (sseGoals[goalId]) {
      sseGoals[goalId].sse.close();
      // Don't decrement pending — we're replacing, not removing, the tail
    }

    const url = BASE + '/api/goals/' + encodeURIComponent(goalId) + '/output';
    // TA Studio uses the browser's native EventSource API (v0.14.9.3).
    // Per the W3C EventSource spec:
    //   - The browser automatically tracks the last received event `id:` field.
    //   - On disconnect, the browser reconnects and sends `Last-Event-ID: <n>`
    //     so the daemon can resume from the correct position in its history buffer.
    // No custom reconnect code is needed here — the browser handles it natively.
    // The daemon emits `id: <seq>` on every SSE event (since v0.14.9.3) to enable
    // this standard flow.
    const sse = new EventSource(url);
    const progressGroupId = 'pg-' + goalId.substring(0, 8);
    const cmdLabel = commandLabel || label || shortId(goalId);

    sseGoals[goalId] = { sse: sse, label: label || shortId(goalId), progressGroupId };

    // Track active request for thinking indicator (v0.11.5 item 11)
    if (isAgentRequest) {
      activeRequests[goalId] = { latestProgress: null, progressGroupId };
    }

    updateTailStatus();

    sse.addEventListener('output', (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.line === undefined) return;

        // Item 1: intercept heartbeat lines — update spinner instead of displaying
        if (HEARTBEAT_PATTERN.test(data.line)) {
          // Extract elapsed seconds if present (e.g. "380s elapsed" → 380)
          const m = data.line.match(/(\d+)s?\s+elapsed/i);
          const secs = m ? parseInt(m[1], 10) : null;
          onHeartbeat(secs);
          return; // don't append to output
        }

        if (data.stream === 'stderr') {
          // v0.11.5 item 9: surface stderr as dimmed progress (not in red error style)
          // v0.11.5 item 10: parse for known progress patterns
          appendProgressLine(data.line, progressGroupId);
          if (activeRequests[goalId]) {
            activeRequests[goalId].latestProgress = data.line;
          }
        } else {
          // stdout: real agent response — show prominently (agent color)
          appendLine(data.line, 'agent');
        }
      } catch (err) {
        appendLine(e.data, 'agent');
      }
    });

    // Item 4+5: done event — clean up stream and show final status
    sse.addEventListener('done', (e) => {
      // v0.11.5 item 12: collapse progress lines when response arrives
      collapseProgressLines(progressGroupId);
      if (activeRequests[goalId]) {
        delete activeRequests[goalId];
      }

      // Item 5: parse completion status from done event data
      let finalMsg = null;
      try {
        const doneData = JSON.parse(e.data || '{}');
        const status = doneData.status || '';
        const exitCode = doneData.exit_code;
        if (exitCode != null && exitCode !== 0) {
          finalMsg = '\u2717 ' + cmdLabel + ' failed (exit ' + exitCode + ')';
        } else if (status.includes('cancel')) {
          finalMsg = '\u2298 ' + cmdLabel + ' canceled';
        } else {
          finalMsg = '\u2713 ' + cmdLabel + ' completed';
        }
      } catch (_) {
        finalMsg = '\u2713 ' + cmdLabel + ' completed';
      }

      sse.close();
      delete sseGoals[goalId];
      updatePending(-1);
      updateTailStatus();
      stopWorkingIndicator(finalMsg);
    });

    sse.addEventListener('lagged', () => {
      appendLine('[some output lines skipped]', 'info');
    });

    // Item 4: handle SSE errors — clean up ghost subscriptions on persistent failure
    let sseErrorCount = 0;
    sse.onerror = () => {
      sseErrorCount++;
      // After 3 consecutive errors (e.g. 404 for already-exited process), clean up
      if (sseErrorCount >= 3 && sseGoals[goalId]) {
        sse.close();
        delete sseGoals[goalId];
        updatePending(-1);
        updateTailStatus();
        stopWorkingIndicator('\u2713 ' + cmdLabel + ' completed');
      }
    };

    // Reset error count on successful message
    sse.addEventListener('output', () => { sseErrorCount = 0; });
  }

  // ── Daemon Events SSE Stream ────────────────────────────────

  function connectEventStream() {
    if (sseEvents) sseEvents.close();

    sseEvents = new EventSource(BASE + '/api/events');

    sseEvents.onopen = () => {
      connStatus.textContent = 'connected';
      connStatus.className = 'connected';
    };

    sseEvents.onerror = () => {
      connStatus.textContent = 'disconnected';
      connStatus.className = 'disconnected';
    };

    sseEvents.onmessage = (e) => {
      try {
        const evt = JSON.parse(e.data);
        const type = evt.event_type || '';

        if (type === 'goal_started') {
          // v0.11.5 item 2: goal lifecycle events in web shell
          const p = evt.payload || evt;
          const title = p.title || '(untitled)';
          const id = p.goal_id || '';
          appendLine('[goal started] "' + title + '" (' + shortId(id) + ')', 'notify');
          if (id) {
            appendLine('Auto-tailing output for ' + shortId(id) + '...', 'tail');
            tailGoalOutput(id, title, false, title);
            updatePending(+1);
            startWorkingIndicator(title);
          }
        } else if (type === 'goal_completed') {
          // v0.11.5 items 2+3: goal completion notification with elapsed time and next action
          const p = evt.payload || evt;
          const title = p.title || '(untitled)';
          const id = p.goal_id || '';
          const durationSecs = p.duration_secs;
          const elapsed = durationSecs ? ' — ' + formatDuration(durationSecs) : '';
          appendLine(
            '[goal completed] "' + title + '" (' + shortId(id) + ')' + elapsed,
            'notify'
          );
          appendLine(
            '  → run: draft view (or check "drafts" for the draft ID)',
            'info'
          );
          // Stop auto-tailing for this goal if active
          if (sseGoals[id]) {
            // Let the 'done' event close it naturally; just note completion
          }
        } else if (type === 'goal_failed') {
          // v0.11.5 item 2: goal failure notification
          const p = evt.payload || evt;
          const id = p.goal_id || '';
          const error = p.error || 'unknown error';
          const exitCode = p.exit_code != null ? ' (exit ' + p.exit_code + ')' : '';
          appendLine(
            '[goal failed] (' + shortId(id) + ')' + exitCode + ' — ' + error,
            'stderr'
          );
          appendLine(
            '  → run: ta goal inspect ' + shortId(id) + ' for details',
            'info'
          );
        } else if (type === 'draft_built') {
          const p = evt.payload || evt;
          appendLine('[draft ready] "' + (p.title || '') + '" -- run: draft view ' + (p.display_id || ''), 'notify');
        } else if (type === 'agent_question') {
          const p = evt.payload || evt;
          appendLine('--- Agent Question ---', 'notify');
          appendLine(p.question || JSON.stringify(p), 'info');
          appendLine('Type your response and press Enter:', 'info');
        }
      } catch (err) {
        if (e.data && e.data.trim()) {
          appendLine(e.data, 'event');
        }
      }
    };
  }

  // ── Status Polling ──────────────────────────────────────────

  async function pollStatus() {
    try {
      const resp = await fetch(BASE + '/api/status');
      const s = await resp.json();
      projectInfo.textContent = s.project + ' v' + s.version;
      versionInfo.textContent = 'daemon ' + (s.build_sha || '?').substring(0, 7);

      // Show default agent framework
      if (s.default_agent) {
        agentFramework.textContent = s.default_agent;
      }

      // Show active agents count
      const agentCount = s.active_agents ? s.active_agents.length : 0;
      const draftCount = s.pending_drafts || 0;
      let parts = [];
      if (agentCount > 0) parts.push(agentCount + ' agent' + (agentCount > 1 ? 's' : ''));
      if (draftCount > 0) parts.push(draftCount + ' draft' + (draftCount > 1 ? 's' : ''));
      agentInfo.textContent = parts.length > 0 ? parts.join(' | ') : 'no agents';

      // Update parallel session limits from daemon config (v0.11.5 item 16)
      if (s.max_parallel_sessions) maxParallelSessions = s.max_parallel_sessions;
      if (s.parallel_idle_timeout_secs) parallelIdleMs = s.parallel_idle_timeout_secs * 1000;

      // Apply cursor style from daemon config (v0.11.7 item 6)
      if (s.cursor_color) {
        document.documentElement.style.setProperty('--cursor-color', s.cursor_color);
      }
      if (s.cursor_style) {
        // cursor_style is informational (CSS caret-color only supports color, not shape)
        // Store for future use; block/bar/underline can be applied to textarea via custom CSS
        document.documentElement.style.setProperty('--cursor-style', s.cursor_style);
      }
      // No-heartbeat alert threshold (v0.11.7 item 2)
      if (s.no_heartbeat_alert_secs) {
        workingState.noHeartbeatAlertSecs = s.no_heartbeat_alert_secs;
      }

      connStatus.textContent = 'connected';
      connStatus.className = 'connected';
    } catch (err) {
      connStatus.textContent = 'disconnected';
      connStatus.className = 'disconnected';
    }
  }

  // ── Init ────────────────────────────────────────────────────

  appendLine('ta shell (web) -- type a command or message. :help for commands, Ctrl+L to clear.', 'info');
  connectEventStream();
  pollStatus();
  statusPoll = setInterval(pollStatus, 10000);
  input.focus();
})();
</script>
</body>

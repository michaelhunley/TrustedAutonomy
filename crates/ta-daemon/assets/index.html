<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6c8cff">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Trusted Autonomy — Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --text: #e1e4ed; --muted: #8b8fa3; --accent: #6c8cff;
    --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border);
          overflow-x: auto; }
  .tab { padding: 0.6rem 1.25rem; cursor: pointer; color: var(--muted); font-size: 0.9rem;
         font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s;
         white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem;
          transition: border-color 0.15s; }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
  .card-title { font-weight: 600; font-size: 1.05rem; }
  .badge { padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
           white-space: nowrap; }
  .badge-draft { background: var(--yellow); color: #000; }
  .badge-pending { background: var(--accent); color: #fff; }
  .badge-approved { background: var(--green); color: #000; }
  .badge-denied { background: var(--red); color: #fff; }
  .badge-cat { background: var(--border); color: var(--text); font-size: 0.7rem; }
  .badge-active { background: #2563eb; color: #fff; }
  .badge-question { background: var(--yellow); color: #000; }
  .card-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }
  .detail { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.5rem; }
  .back { color: var(--accent); cursor: pointer; font-size: 0.9rem;
          margin-bottom: 1rem; display: inline-block; }
  .back:hover { text-decoration: underline; }
  .actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 6px; font-size: 0.9rem;
         font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-approve { background: var(--green); color: #000; }
  .btn-deny { background: var(--red); color: #fff; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .section { margin-top: 1.25rem; }
  .section h3 { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.5rem;
                text-transform: uppercase; letter-spacing: 0.05em; }
  .artifact { background: var(--bg); border: 1px solid var(--border);
              border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem;
              font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; }
  .artifact-uri { color: var(--accent); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
        padding: 1rem; overflow-x: auto; font-size: 0.85rem; margin-top: 0.5rem; }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border);
                      border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text);
                      font-size: 0.9rem; }
  .search-bar input::placeholder { color: var(--muted); }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
               gap: 0.75rem; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: 8px; padding: 1rem; text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
  .tag { display: inline-block; background: var(--border); border-radius: 4px;
         padding: 0.1rem 0.4rem; font-size: 0.7rem; margin-right: 0.25rem; }
  .confidence-bar { display: inline-block; width: 60px; height: 6px; background: var(--border);
                    border-radius: 3px; vertical-align: middle; margin-left: 0.5rem; }
  .confidence-fill { height: 100%; border-radius: 3px; background: var(--green); }
  /* Form styles */
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.9rem;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  /* Answer panel */
  .question-card { border-left: 3px solid var(--yellow); }
  .answer-input { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .answer-input input { flex: 1; background: var(--bg); border: 1px solid var(--border);
                        border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text);
                        font-size: 0.9rem; }
  .answer-input input:focus { outline: none; border-color: var(--accent); }
  /* Dashboard sections */
  .dash-section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em;
                        color: var(--muted); margin-bottom: 0.6rem; padding-bottom: 0.3rem;
                        border-bottom: 1px solid var(--border); }
  .dash-section { margin-bottom: 1.5rem; }
  /* Template grid */
  .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                   gap: 0.75rem; margin-top: 0.75rem; }
  .template-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                   padding: 0.9rem; cursor: pointer; transition: border-color 0.15s; }
  .template-tile:hover, .template-tile.selected { border-color: var(--accent); }
  .template-tile.selected { background: #1e2235; }
  .template-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .template-desc { font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <h1>Trusted Autonomy</h1>
  <p class="subtitle" id="subtitle">Loading...</p>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="tab" onclick="switchTab('plan')">Plan</div>
    <div class="tab" onclick="switchTab('drafts')">Review Drafts</div>
    <div class="tab" onclick="switchTab('questions')" id="tab-questions">Agent Questions</div>
    <div class="tab" onclick="switchTab('memory')">Memory</div>
    <div class="tab" onclick="switchTab('projects')" id="tab-projects">Projects</div>
    <div class="tab" onclick="switchTab('settings')">Settings</div>
  </div>
  <div id="app"><div class="loading">Loading...</div></div>
  <!-- Setup Wizard Overlay -->
  <div id="wizard-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;overflow-y:auto;">
    <div style="max-width:620px;margin:3rem auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;">
      <div id="wizard-content"></div>
    </div>
  </div>
</div>
<script>
const app = document.getElementById('app');
let currentTab = 'dashboard';
let drafts = [];

// ── Utilities ─────────────────────────────────────────────────
function esc(s) {
  if (s === null || s === undefined) return '';
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function badgeClass(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('approved')) return 'badge-approved';
  if (s.includes('denied')) return 'badge-denied';
  if (s.includes('pending')) return 'badge-pending';
  return 'badge-draft';
}

// ── Tab navigation ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    const label = t.textContent.trim().toLowerCase().replace(/ /g, '-');
    t.classList.toggle('active', label === tab || (tab === 'dashboard' && label === 'dashboard'));
  });
  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'plan') loadPlan();
  else if (tab === 'drafts') loadDrafts();
  else if (tab === 'questions') loadQuestions();
  else if (tab === 'memory') loadMemory();
  else if (tab === 'projects') loadProjects();
  else if (tab === 'settings') loadSettings();
}

// ── Dashboard ─────────────────────────────────────────────────
async function loadDashboard() {
  app.innerHTML = '<div class="loading">Loading dashboard...</div>';
  try {
    const [draftsResp, questionsResp, statusResp] = await Promise.allSettled([
      fetch('/api/drafts'),
      fetch('/api/interactions/pending'),
      fetch('/api/status')
    ]);

    const draftsData = draftsResp.status === 'fulfilled' && draftsResp.value.ok
      ? await draftsResp.value.json().catch(() => [])
      : [];
    const questions = questionsResp.status === 'fulfilled' && questionsResp.value.ok
      ? await questionsResp.value.json().catch(() => [])
      : [];
    const status = statusResp.status === 'fulfilled' && statusResp.value.ok
      ? await statusResp.value.json().catch(() => null)
      : null;

    // Update subtitle with timestamp.
    document.getElementById('subtitle').textContent =
      'Review Dashboard — updated ' + new Date().toLocaleTimeString();

    // Highlight questions tab if there are pending questions.
    const qTab = document.getElementById('tab-questions');
    if (questions.length > 0) {
      qTab.textContent = 'Agent Questions (' + questions.length + ')';
      qTab.style.color = 'var(--yellow)';
    } else {
      qTab.textContent = 'Agent Questions';
      qTab.style.color = '';
    }

    // Redirect to Projects tab if no active project is set (v0.14.18).
    if (status && status.active_project_path === null) {
      switchTab('projects');
      return;
    }

    renderDashboard(draftsData, questions, status);
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load dashboard. Is the daemon running?</div>';
  }
}

function renderDashboard(allDrafts, questions, status) {
  const pending = allDrafts.filter(d => d.status && d.status.toLowerCase().includes('pending'));
  const active = allDrafts.filter(d => d.status && d.status.toLowerCase().includes('draft'));

  let html = '';

  // Active work.
  if (active.length > 0) {
    html += '<div class="dash-section">';
    html += '<div class="dash-section-title">Active Work</div>';
    html += active.slice(0, 3).map(d => `
      <div class="card clickable" onclick="switchTab('drafts');setTimeout(()=>showDraftDetail('${d.package_id}'),100)">
        <div class="card-header">
          <span class="card-title">${esc(d.title)}</span>
          <span class="badge badge-active">In Progress</span>
        </div>
        <div class="card-meta">${d.artifact_count} artifact${d.artifact_count !== 1 ? 's' : ''} &middot; ${timeAgo(d.created_at)}</div>
      </div>
    `).join('');
    html += '</div>';
  }

  // Ready to review.
  if (pending.length > 0) {
    html += '<div class="dash-section">';
    html += '<div class="dash-section-title">Ready to Review (' + pending.length + ')</div>';
    html += pending.slice(0, 5).map(d => `
      <div class="card clickable" onclick="switchTab('drafts');setTimeout(()=>showDraftDetail('${d.package_id}'),100)">
        <div class="card-header">
          <span class="card-title">${esc(d.title)}</span>
          <span class="badge badge-pending">Needs Review</span>
        </div>
        <div class="card-meta">${d.artifact_count} artifact${d.artifact_count !== 1 ? 's' : ''} &middot; ${timeAgo(d.created_at)}</div>
      </div>
    `).join('');
    html += '</div>';
  }

  // Agent questions.
  if (questions.length > 0) {
    html += '<div class="dash-section">';
    html += '<div class="dash-section-title">Agent Has a Question (' + questions.length + ')</div>';
    html += questions.slice(0, 3).map(q => `
      <div class="card clickable" onclick="switchTab('questions')">
        <div class="card-header">
          <span class="card-title">${esc(q.prompt || 'Agent question')}</span>
          <span class="badge badge-question">Waiting</span>
        </div>
        <div class="card-meta">${timeAgo(q.created_at || q.timestamp)}</div>
      </div>
    `).join('');
    html += '</div>';
  }

  // Summary stats.
  html += '<div class="stat-grid">';
  html += `<div class="stat-card"><div class="stat-value">${pending.length}</div><div class="stat-label">Needs Review</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${active.length}</div><div class="stat-label">In Progress</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${questions.length}</div><div class="stat-label">Waiting for You</div></div>`;
  const total = allDrafts.length;
  html += `<div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Drafts</div></div>`;
  html += '</div>';

  if (active.length === 0 && pending.length === 0 && questions.length === 0) {
    html += '<div class="empty">Everything is up to date. Start a new goal from the <strong>Plan</strong> tab.</div>';
  }

  html += '<div style="margin-top:1rem;font-size:0.8rem;color:var(--muted);text-align:right">' +
    '<button class="btn btn-sm btn-ghost" onclick="loadDashboard()">Refresh</button></div>';

  app.innerHTML = html;
}

// ── Plan Tab (v0.14.19) ────────────────────────────────────────

let planPhases = [];

async function loadPlan() {
  app.innerHTML = '<div class="loading">Loading plan...</div>';
  try {
    const resp = await fetch('/api/plan/phases');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    planPhases = await resp.json();
  } catch (e) {
    planPhases = [];
  }
  renderPlan();
}

function renderPlan() {
  const pending = planPhases.filter(p => p.status === 'pending' || p.status === 'in_progress');
  let html = '';

  // ── Next Up (phase list) ────────────────────────────────────
  html += '<div class="dash-section">';
  html += '<div class="dash-section-title">Next Up</div>';
  if (pending.length === 0) {
    html += '<div class="card"><div class="card-meta">';
    if (planPhases.length === 0) {
      html += 'No PLAN.md found. Add phases below or run <code>ta plan create</code> in your project.';
    } else {
      html += 'All phases are complete. Add a new phase below.';
    }
    html += '</div></div>';
  } else {
    pending.forEach(ph => {
      const statusColor = ph.status === 'in_progress' ? 'var(--yellow)' : 'var(--accent)';
      const runningBadge = ph.running
        ? '<span class="badge badge-active" style="margin-left:0.5rem">Running</span>'
        : '';
      html += `<div class="card" id="phase-card-${esc(ph.id)}">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0">
            <span style="color:var(--muted);font-family:monospace;font-size:0.8rem;flex-shrink:0">${esc(ph.id)}</span>
            <span class="card-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ph.title)}</span>
            ${runningBadge}
          </div>
          <div style="display:flex;gap:0.5rem;flex-shrink:0">
            <button class="btn btn-sm btn-ghost" onclick="togglePhaseExpand('${esc(ph.id)}')">Details</button>
            <button class="btn btn-sm btn-primary" id="run-btn-${esc(ph.id)}"
              onclick="runPhase('${esc(ph.id)}')"
              ${ph.running ? 'disabled title="A goal for this phase is already running"' : ''}>
              Run
            </button>
          </div>
        </div>
        <div class="card-meta" id="phase-desc-${esc(ph.id)}" style="margin-top:0.35rem">
          ${ph.description ? esc(ph.description) : ''}
        </div>
        <div id="phase-expand-${esc(ph.id)}" style="display:none;margin-top:0.75rem">
          ${renderPhaseDetails(ph)}
        </div>
      </div>`;
    });
  }
  html += '</div>';

  // ── Custom Goal ─────────────────────────────────────────────
  html += `<div class="dash-section">
    <div class="dash-section-title">Custom Goal</div>
    <div class="card">
      <div class="form-group">
        <label>What do you want to build or fix?</label>
        <textarea id="customGoalPrompt" rows="3"
          placeholder="Describe the goal for the agent..."></textarea>
      </div>
      <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0">
          <label>Title <span style="color:var(--red)">*</span></label>
          <input id="customGoalTitle" type="text" placeholder="e.g. Fix auth bug">
        </div>
        <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0">
          <label>Link to phase (optional)</label>
          <select id="customGoalPhase">
            <option value="">— none —</option>
            ${pending.map(p => `<option value="${esc(p.id)}">${esc(p.id)} — ${esc(p.title)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="actions" style="margin-top:1rem">
        <button class="btn btn-primary" onclick="submitCustomGoal()">Run Goal</button>
      </div>
      <div id="customGoalResult" style="margin-top:0.75rem;font-size:0.9rem"></div>
    </div>
  </div>`;

  // ── Add Phase ───────────────────────────────────────────────
  html += `<div class="dash-section">
    <div class="dash-section-title">Add Phase</div>
    <div class="card">
      <div class="form-group">
        <label>Phase title <span style="color:var(--red)">*</span></label>
        <input id="newPhaseTitle" type="text" placeholder="e.g. Add dark mode support">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="newPhaseDesc" rows="2"
          placeholder="What should this phase accomplish?"></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="submitAddPhase()">Add to Plan</button>
      </div>
      <div id="addPhaseResult" style="margin-top:0.75rem;font-size:0.9rem"></div>
    </div>
  </div>`;

  app.innerHTML = html;
}

function renderPhaseDetails(ph) {
  let html = '';
  if (ph.depends_on && ph.depends_on.length > 0) {
    html += `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem">
      Depends on: ${ph.depends_on.map(d => `<span class="tag">${esc(d)}</span>`).join(' ')}
    </div>`;
  }
  if (ph.items && ph.items.length > 0) {
    html += '<div style="font-size:0.85rem">';
    ph.items.forEach(item => {
      const icon = item.done
        ? '<span style="color:var(--green)">✓</span>'
        : '<span style="color:var(--muted)">○</span>';
      const style = item.done ? 'color:var(--muted);text-decoration:line-through' : '';
      html += `<div style="display:flex;gap:0.5rem;padding:0.2rem 0;${style}">${icon} ${esc(item.text)}</div>`;
    });
    html += '</div>';
  } else {
    html += '<div style="font-size:0.85rem;color:var(--muted)">No checklist items.</div>';
  }
  return html;
}

function togglePhaseExpand(id) {
  const el = document.getElementById('phase-expand-' + id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function runPhase(phaseId) {
  const btn = document.getElementById('run-btn-' + phaseId);
  if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
  try {
    const resp = await fetch('/api/goal/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phase_id: phaseId })
    });
    if (resp.ok) {
      if (btn) { btn.textContent = 'Running'; }
      setTimeout(() => switchTab('dashboard'), 1200);
    } else {
      const text = await resp.text();
      if (btn) { btn.disabled = false; btn.textContent = 'Run'; }
      alert('Failed to start goal: ' + text);
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Run'; }
    alert('Network error: ' + e.message);
  }
}

async function submitCustomGoal() {
  const title = document.getElementById('customGoalTitle')?.value.trim() || '';
  const prompt = document.getElementById('customGoalPrompt')?.value.trim() || '';
  const phaseId = document.getElementById('customGoalPhase')?.value || '';
  const result = document.getElementById('customGoalResult');

  if (!title) {
    if (result) { result.innerHTML = '<span style="color:var(--red)">Title is required.</span>'; }
    return;
  }

  if (result) result.innerHTML = '<span style="color:var(--muted)">Starting goal…</span>';

  const body = {
    title,
    prompt: prompt || undefined,
    phase_id: phaseId || undefined,
  };

  try {
    const resp = await fetch('/api/goal/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      if (result) result.innerHTML = '<span style="color:var(--green)">Goal started!</span>';
      setTimeout(() => switchTab('dashboard'), 1200);
    } else {
      const text = await resp.text();
      if (result) result.innerHTML = '<span style="color:var(--red)">Error: ' + esc(text) + '</span>';
    }
  } catch (e) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Could not reach daemon. ' +
      'Start it with <code>ta daemon start</code>.</span>';
  }
}

async function submitAddPhase() {
  const title = document.getElementById('newPhaseTitle')?.value.trim() || '';
  const description = document.getElementById('newPhaseDesc')?.value.trim() || '';
  const result = document.getElementById('addPhaseResult');

  if (!title) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Title is required.</span>';
    return;
  }

  if (result) result.innerHTML = '<span style="color:var(--muted)">Adding phase…</span>';

  try {
    const resp = await fetch('/api/plan/phase/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description })
    });
    if (resp.ok) {
      const phase = await resp.json();
      if (result) result.innerHTML = `<span style="color:var(--green)">Phase ${esc(phase.id)} added.</span>`;
      if (document.getElementById('newPhaseTitle')) document.getElementById('newPhaseTitle').value = '';
      if (document.getElementById('newPhaseDesc')) document.getElementById('newPhaseDesc').value = '';
      // Reload plan to show the new phase.
      setTimeout(() => loadPlan(), 800);
    } else {
      const text = await resp.text();
      if (result) result.innerHTML = '<span style="color:var(--red)">Error: ' + esc(text) + '</span>';
    }
  } catch (e) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Network error: ' + esc(e.message) + '</span>';
  }
}

// ── Draft Review ───────────────────────────────────────────────
async function loadDrafts() {
  app.innerHTML = '<div class="loading">Loading drafts...</div>';
  try {
    const resp = await fetch('/api/drafts');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    drafts = await resp.json();
    renderDraftList();
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load drafts. Is the daemon running?</div>';
  }
}

function renderDraftList() {
  if (!drafts || drafts.length === 0) {
    app.innerHTML = '<div class="empty">No drafts yet. Start a goal from the <strong>Plan</strong> tab.</div>';
    return;
  }
  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
      <span style="color:var(--muted);font-size:0.85rem">${drafts.length} draft${drafts.length !== 1 ? 's' : ''}</span>
      <button class="btn btn-sm btn-ghost" onclick="loadDrafts()">Refresh</button>
    </div>
  ` + drafts.map(d => `
    <div class="card clickable" onclick="showDraftDetail('${d.package_id}')">
      <div class="card-header">
        <span class="card-title">${esc(d.title)}</span>
        <span class="badge ${badgeClass(d.status)}">${esc(d.status)}</span>
      </div>
      <div class="card-meta">
        ${d.artifact_count} artifact${d.artifact_count !== 1 ? 's' : ''} &middot;
        ${timeAgo(d.created_at)} &middot;
        <code style="font-size:0.75rem">${d.package_id.slice(0, 8)}</code>
      </div>
    </div>
  `).join('');
}

async function showDraftDetail(id) {
  app.innerHTML = '<div class="loading">Loading draft...</div>';
  try {
    const resp = await fetch('/api/drafts/' + id);
    if (!resp.ok) { renderDraftList(); return; }
    const d = await resp.json();
    renderDraftDetail(d);
  } catch (e) { renderDraftList(); }
}

function renderDraftDetail(d) {
  const artifacts = (d.changes && d.changes.artifacts) || [];
  const actions = (d.changes && d.changes.pending_actions) || [];
  const isReviewable = d.status && d.status.toLowerCase().includes('pending');

  app.innerHTML = `
    <span class="back" onclick="loadDrafts()">&larr; Back to drafts</span>
    <div class="detail">
      <div class="card-header">
        <span class="card-title">${esc(d.goal && d.goal.title || 'Draft')}</span>
        <span class="badge ${badgeClass(d.status)}">${esc(d.status)}</span>
      </div>
      <div class="card-meta">
        <code>${d.package_id}</code> &middot; ${new Date(d.created_at).toLocaleString()}
      </div>
      ${d.summary ? `<div class="section"><h3>Summary</h3><p>${esc(d.summary.description || '')}</p></div>` : ''}
      <div class="section">
        <h3>Changed Files (${artifacts.length})</h3>
        ${artifacts.length === 0
          ? '<p style="color:var(--muted)">No artifacts</p>'
          : artifacts.map(a => `
            <div class="artifact">
              <span class="artifact-uri">${esc(a.resource_uri)}</span>
              ${a.disposition ? ' &middot; <span style="color:var(--muted)">' + esc(a.disposition) + '</span>' : ''}
            </div>
          `).join('')}
      </div>
      ${actions.length > 0 ? `
        <div class="section">
          <h3>Pending Actions (${actions.length})</h3>
          ${actions.map(a => `
            <div class="artifact">
              <span class="artifact-uri">${esc(a.tool_name)}</span>
              &middot; ${esc(a.kind)} &middot; ${esc(a.description)}
            </div>
          `).join('')}
        </div>
      ` : ''}
      ${isReviewable ? `
        <div class="actions">
          <button class="btn btn-approve" onclick="doDraftAction('${d.package_id}','approve')">Approve</button>
          <button class="btn btn-deny" onclick="doDraftAction('${d.package_id}','deny')">Deny</button>
        </div>
      ` : `
        <div class="actions">
          <button class="btn btn-ghost" onclick="loadDrafts()">&larr; Back</button>
        </div>
      `}
    </div>
  `;
}

async function doDraftAction(id, action) {
  const btn = event && event.target;
  if (btn) btn.disabled = true;
  try {
    const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
    if (action === 'deny') {
      const reason = prompt('Reason for denial:', 'Needs revision');
      if (reason === null) { if (btn) btn.disabled = false; return; }
      opts.body = JSON.stringify({ reason });
    }
    const resp = await fetch('/api/drafts/' + id + '/' + action, opts);
    if (resp.ok) {
      await loadDrafts();
    } else {
      alert('Action failed: ' + await resp.text());
      if (btn) btn.disabled = false;
    }
  } catch (e) {
    alert('Network error');
    if (btn) btn.disabled = false;
  }
}

// ── Agent Questions ────────────────────────────────────────────
async function loadQuestions() {
  app.innerHTML = '<div class="loading">Loading questions...</div>';
  try {
    const resp = await fetch('/api/interactions/pending');
    const questions = resp.ok ? await resp.json().catch(() => []) : [];
    renderQuestions(questions);
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load questions. Is the daemon running?</div>';
  }
}

function renderQuestions(questions) {
  if (!questions || questions.length === 0) {
    app.innerHTML = `
      <div class="empty">
        <p>No pending questions from agents.</p>
        <p style="margin-top:0.5rem;font-size:0.85rem">When an agent needs clarification, its question will appear here.</p>
        <button class="btn btn-sm btn-ghost" style="margin-top:1rem" onclick="loadQuestions()">Refresh</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
      <span style="color:var(--muted);font-size:0.85rem">${questions.length} question${questions.length !== 1 ? 's' : ''} waiting</span>
      <button class="btn btn-sm btn-ghost" onclick="loadQuestions()">Refresh</button>
    </div>
  ` + questions.map((q, i) => `
    <div class="card question-card" id="q-${esc(q.interaction_id || i)}">
      <div class="card-header">
        <span class="card-title" style="font-size:0.95rem">${esc(q.prompt || q.question || 'Agent question')}</span>
        <span class="badge badge-question">Waiting</span>
      </div>
      <div class="card-meta">${timeAgo(q.created_at || q.timestamp)}
        ${q.goal_id ? ' &middot; goal: <code>' + esc(q.goal_id.slice(0, 8)) + '</code>' : ''}</div>
      ${q.context ? `<div style="margin-top:0.5rem;font-size:0.85rem;color:var(--muted)">${esc(q.context)}</div>` : ''}
      <div class="answer-input">
        <input id="ans-${i}" type="text" placeholder="Type your answer..."
               onkeydown="if(event.key==='Enter')submitAnswer('${esc(q.interaction_id || '')}',${i})">
        <button class="btn btn-primary btn-sm"
                onclick="submitAnswer('${esc(q.interaction_id || '')}',${i})">Reply</button>
      </div>
    </div>
  `).join('');
}

async function submitAnswer(id, idx) {
  const input = document.getElementById('ans-' + idx);
  if (!input) return;
  const answer = input.value.trim();
  if (!answer) { input.focus(); return; }

  input.disabled = true;
  try {
    const resp = await fetch('/api/interactions/' + id + '/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ response: answer })
    });
    if (resp.ok) {
      // Remove the card.
      const card = document.getElementById('q-' + id) || input.closest('.card');
      if (card) {
        card.style.opacity = '0.5';
        card.innerHTML += '<div style="color:var(--green);margin-top:0.5rem;font-size:0.85rem">Answer sent.</div>';
      }
      setTimeout(loadQuestions, 800);
    } else {
      const text = await resp.text();
      alert('Failed to send answer: ' + text);
      input.disabled = false;
    }
  } catch (e) {
    alert('Network error');
    input.disabled = false;
  }
}

// ── Memory ─────────────────────────────────────────────────────
async function loadMemory() {
  app.innerHTML = '<div class="loading">Loading memory...</div>';
  try {
    const [statsResp, entriesResp] = await Promise.all([
      fetch('/api/memory/stats'),
      fetch('/api/memory?limit=50')
    ]);
    const stats = statsResp.ok ? await statsResp.json().catch(() => ({})) : {};
    const entries = entriesResp.ok ? await entriesResp.json().catch(() => []) : [];
    renderMemory(stats, entries);
  } catch (e) {
    app.innerHTML = '<div class="empty">Failed to load memory store.</div>';
  }
}

function renderMemory(stats, entries) {
  const cats = Object.entries(stats.by_category || {}).sort((a, b) => b[1] - a[1]);
  app.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${stats.total_entries || 0}</div><div class="stat-label">Total Entries</div></div>
      <div class="stat-card"><div class="stat-value">${stats.expired_count || 0}</div><div class="stat-label">Expired</div></div>
      <div class="stat-card"><div class="stat-value">${typeof stats.avg_confidence === 'number' ? stats.avg_confidence.toFixed(2) : '—'}</div><div class="stat-label">Avg Confidence</div></div>
      <div class="stat-card"><div class="stat-value">${cats.length}</div><div class="stat-label">Categories</div></div>
    </div>
    ${cats.length > 0 ? `<div class="section"><h3>By Category</h3>${cats.map(([c,n]) => `<span class="tag">${esc(c)}: ${n}</span>`).join(' ')}</div>` : ''}
    <div class="search-bar" style="margin-top:1rem">
      <input type="text" id="memSearch" placeholder="Search memory entries..." onkeydown="if(event.key==='Enter')searchMemory()">
      <button class="btn btn-primary btn-sm" onclick="searchMemory()">Search</button>
      <button class="btn btn-sm btn-ghost" onclick="showCreateForm()">+ New</button>
    </div>
    <div id="memEntries">${renderMemoryEntries(entries)}</div>
  `;
}

function renderMemoryEntries(entries) {
  if (!entries || entries.length === 0) return '<div class="empty">No memory entries.</div>';
  return entries.map(e => {
    const val = typeof e.value === 'string' ? e.value : JSON.stringify(e.value);
    const preview = val && val.length > 80 ? val.slice(0, 77) + '...' : (val || '');
    const confPct = Math.round((e.confidence || 0) * 100);
    return `
      <div class="card" style="cursor:default">
        <div class="card-header">
          <span class="card-title" style="font-size:0.95rem">${esc(e.key)}</span>
          <span>
            ${e.category ? `<span class="badge badge-cat">${esc(e.category)}</span>` : ''}
            <span class="confidence-bar"><span class="confidence-fill" style="width:${confPct}%"></span></span>
          </span>
        </div>
        <div style="font-size:0.85rem;color:var(--muted);margin-top:0.4rem">${esc(preview)}</div>
        <div class="card-meta">
          source: ${esc(e.source)} &middot; ${timeAgo(e.updated_at)}
          ${(e.tags || []).length ? ' &middot; ' + e.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') : ''}
          <span style="float:right;cursor:pointer;color:var(--red)" onclick="deleteMemory('${esc(e.key)}')">delete</span>
        </div>
      </div>
    `;
  }).join('');
}

async function searchMemory() {
  const q = document.getElementById('memSearch').value.trim();
  if (!q) { loadMemory(); return; }
  try {
    const resp = await fetch('/api/memory/search?q=' + encodeURIComponent(q));
    const entries = resp.ok ? await resp.json().catch(() => []) : [];
    const el = document.getElementById('memEntries');
    if (el) el.innerHTML = renderMemoryEntries(entries);
  } catch (e) { /* ignore */ }
}

async function deleteMemory(key) {
  if (!confirm('Delete memory entry "' + key + '"?')) return;
  try {
    await fetch('/api/memory/' + encodeURIComponent(key), { method: 'DELETE' });
    loadMemory();
  } catch (e) { alert('Failed to delete'); }
}

function showCreateForm() {
  app.innerHTML = `
    <span class="back" onclick="loadMemory()">&larr; Back to memory</span>
    <div class="detail">
      <h3 style="margin-bottom:1rem">Create Memory Entry</h3>
      <div class="form-group">
        <label>Key <span style="color:var(--red)">*</span></label>
        <input id="newKey" type="text" placeholder="e.g., convention:use-tempdir">
      </div>
      <div class="form-group">
        <label>Value</label>
        <textarea id="newValue" placeholder="Text or JSON value"></textarea>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="newCategory">
          <option value="">None</option>
          <option value="convention">Convention</option>
          <option value="architecture">Architecture</option>
          <option value="history">History</option>
          <option value="preference">Preference</option>
          <option value="relationship">Relationship</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tags (comma-separated)</label>
        <input id="newTags" type="text" placeholder="e.g., testing, rust">
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="createMemory()">Create</button>
        <button class="btn btn-ghost" onclick="loadMemory()">Cancel</button>
      </div>
    </div>
  `;
}

async function createMemory() {
  const key = document.getElementById('newKey').value.trim();
  if (!key) { alert('Key is required'); return; }
  const val = document.getElementById('newValue').value.trim() || key;
  const cat = document.getElementById('newCategory').value || undefined;
  const tags = document.getElementById('newTags').value.split(',').map(s => s.trim()).filter(Boolean);
  let value;
  try { value = JSON.parse(val); } catch { value = val; }
  try {
    const resp = await fetch('/api/memory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value, tags, category: cat })
    });
    if (resp.ok) loadMemory();
    else alert('Failed: ' + await resp.text());
  } catch (e) { alert('Network error'); }
}

    const status = await resp.json();
    if (!status.wizard_complete) {

        <button class="btn btn-primary" onclick="finishWizard()">Go to Dashboard</button>
      </div>`;
  }
}

async function validateWizardApiKey() {
  const key = document.getElementById('wiz-api-key').value.trim();
  const el = document.getElementById('wiz-validate-result');
  try {
    const resp = await fetch('/api/settings/agent/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: key })
    });
    const data = await resp.json();
    el.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    el.textContent = data.message || data.status;
  } catch (e) { el.textContent = 'Network error'; el.style.color = 'var(--red)'; }
}

async function checkWizardVcs() {
  const url = document.getElementById('wiz-repo-url').value.trim();
  const token = document.getElementById('wiz-vcs-token').value.trim();
  const el = document.getElementById('wiz-vcs-result');
  try {
    const resp = await fetch('/api/settings/vcs/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token })
    });
    const data = await resp.json();
    el.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    el.textContent = data.message || data.status;
  } catch (e) { el.textContent = 'Network error'; el.style.color = 'var(--red)'; }
}

async function testWizardNotification(channel) {
  const urlEl = document.getElementById('wiz-' + channel + '-url');
  const resultEl = document.getElementById('wiz-' + channel + '-result');
  if (!urlEl || !resultEl) return;
  try {
    const resp = await fetch('/api/settings/notifications/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: urlEl.value.trim(), channel })
    });
    const data = await resp.json();
    resultEl.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
    resultEl.textContent = data.message || data.status;
  } catch (e) { resultEl.textContent = 'Network error'; resultEl.style.color = 'var(--red)'; }
}

function wizardBack(fromStep) {
  wizardStep = fromStep - 1;
  saveWizardProgress(wizardStep, false);
  renderWizardStep(wizardStep);
}

function wizardNext(fromStep) {
  // Collect data from current step.
  if (fromStep === 1) {
    wizardData.agent.framework = document.getElementById('wiz-framework').value;
    wizardData.agent.apiKey = document.getElementById('wiz-api-key').value;
  } else if (fromStep === 2) {
    wizardData.vcs.type = document.getElementById('wiz-vcs-type').value;
    wizardData.vcs.url = document.getElementById('wiz-repo-url').value;
    wizardData.vcs.token = document.getElementById('wiz-vcs-token').value;
  } else if (fromStep === 3) {
    wizardData.notifications.discord = document.getElementById('wiz-discord-url').value;
    wizardData.notifications.slack = document.getElementById('wiz-slack-url').value;
  } else if (fromStep === 4) {
    wizardData.project.name = document.getElementById('wiz-proj-name').value;
    wizardData.project.desc = document.getElementById('wiz-proj-desc').value;
    wizardData.project.goal = document.getElementById('wiz-proj-goal').value;
    wizardData.project.approval = document.getElementById('wiz-approval').value;
  }
  wizardStep = fromStep + 1;
  saveWizardProgress(wizardStep, false);
  renderWizardStep(wizardStep);
}

async function finishWizard() {
  await saveWizardProgress(5, true);
  hideWizardOverlay();
  switchTab('dashboard');
}

// ── Settings Tab ───────────────────────────────────────────────
let settingsSection = 'agent';

async function loadSettings() {
  app.innerHTML = `
    <div style="display:flex;gap:1.5rem;align-items:flex-start">
      <div style="min-width:150px">
        <div class="dash-section-title">Settings</div>
        ${['agent','vcs','workflow','policy','constitution','notifications','memory','advanced'].map(s =>
          `<div class="tab" style="display:block;border:none;padding:0.4rem 0.75rem;border-radius:6px;margin-bottom:0.25rem;${settingsSection===s?'background:var(--surface);color:var(--accent)':''}" onclick="loadSettingsSection('${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</div>`
        ).join('')}
      </div>
      <div id="settings-main" style="flex:1"></div>
    </div>`;
  loadSettingsSection(settingsSection);
}

async function loadSettingsSection(section) {
  settingsSection = section;
  const el = document.getElementById('settings-main');
  if (!el) return;
  el.innerHTML = '<div class="loading">Loading...</div>';
  // Re-render the sidebar to highlight active section.
  document.querySelectorAll('.tab[onclick^="loadSettingsSection"]').forEach(t => {
    const s = t.getAttribute('onclick').match(/'(\w+)'/)?.[1];
    t.style.color = s === section ? 'var(--accent)' : '';
    t.style.background = s === section ? 'var(--surface)' : '';
  });

  if (section === 'advanced') {
    el.innerHTML = `
      <h3 style="margin-bottom:1rem">Advanced — Raw Config Editors</h3>
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1rem">Edit configuration files directly. Changes take effect on next daemon restart.</p>
      <div class="form-group">
        <label>daemon.toml path: <code>.ta/daemon.toml</code></label>
        <textarea id="raw-daemon" style="min-height:200px;font-family:monospace" placeholder="Loading..."></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="saveRawConfig()">Save daemon.toml</button>
      </div>`;
    return;
  }

  try {
    const resp = await fetch('/api/settings/' + section);
    if (!resp.ok) { el.innerHTML = '<div class="empty">Section not available.</div>'; return; }
    const result = await resp.json();
    const data = result.data || {};
    el.innerHTML = renderSettingsForm(section, data);
  } catch (e) { el.innerHTML = '<div class="empty">Could not load settings.</div>'; }
}

function renderSettingsForm(section, data) {
  const field = (key, label, type, val, placeholder) =>
    `<div class="form-group"><label>${label}</label><input id="setting-${key}" type="${type}" value="${esc(val)}" placeholder="${esc(placeholder||'')}"></div>`;
  const select = (key, label, options, val) =>
    `<div class="form-group"><label>${label}</label><select id="setting-${key}">${options.map(([v,l])=>`<option value="${v}"${val===v?' selected':''}>${l}</option>`).join('')}</select></div>`;
  const toggle = (key, label, val) =>
    `<div class="form-group" style="display:flex;align-items:center;gap:0.75rem"><input id="setting-${key}" type="checkbox"${val?' checked':''}><label for="setting-${key}">${label}</label></div>`;

  let html = `<h3 style="margin-bottom:1rem;text-transform:capitalize">${section} Settings</h3>`;

  if (section === 'agent') {
    html += select('default_framework', 'AI Framework', [['claude-code','Claude (Anthropic)'],['openai','OpenAI'],['ollama','Ollama (local)']], data.default_framework);
    html += field('default_agent', 'Agent Binary', 'text', data.default_agent, 'claude-code');
    html += field('timeout_secs', 'Timeout (seconds)', 'number', data.timeout_secs, '300');
    html += field('max_sessions', 'Max Sessions', 'number', data.max_sessions, '5');
    html += `<div class="actions"><button class="btn btn-ghost btn-sm" onclick="testAgentConnection()">Test Connection</button><span id="agent-test-result" style="color:var(--muted);font-size:0.85rem;margin-left:0.5rem"></span></div>`;
  } else if (section === 'vcs') {
    html += select('vcs_type', 'VCS Type', [['git','Git'],['p4','Perforce'],['none','None']], data.vcs_type || 'git');
    html += field('remote_url', 'Remote URL', 'text', data.remote_url, 'https://github.com/...');
    html += field('token', 'Access Token', 'password', data.token, 'GitHub PAT or P4 password');
    html += `<div class="actions"><button class="btn btn-ghost btn-sm" onclick="checkVcsConnection()">Check Connection</button><span id="vcs-check-result" style="color:var(--muted);font-size:0.85rem;margin-left:0.5rem"></span></div>`;
  } else if (section === 'workflow') {
    html += field('bind', 'Bind Address', 'text', data.bind, '127.0.0.1');
    html += field('port', 'Port', 'number', data.port, '7700');
  } else if (section === 'policy') {
    html += toggle('file_read', 'Allow file reads', data.file_read);
    html += toggle('file_write', 'Allow file writes', data.file_write);
    html += toggle('shell_commands', 'Allow shell command execution', data.shell_commands);
    html += toggle('network', 'Allow network requests', data.network);
    html += toggle('git_push_protected', 'Protect git push to main/master', data.git_push_protected);
  } else if (section === 'constitution') {
    html += `<p style="color:var(--muted);font-size:0.9rem;margin-bottom:1rem">Quality rules applied to all agent goals.</p>`;
    (data.rules || []).forEach(r =>
      html += toggle('rule-' + r.id, r.label, r.enabled)
    );
    html += field('custom_rule', 'Custom Rule', 'text', data.custom_rule, 'Add a custom quality rule...');
  } else if (section === 'notifications') {
    html += field('discord_token', 'Discord Bot Token', 'password', data.discord_token, 'Bot token from Discord developer portal');
    html += field('slack_token', 'Slack Bot Token', 'password', data.slack_token, 'xoxb-... from Slack app settings');
    html += `<div class="actions">
      <button class="btn btn-ghost btn-sm" onclick="testNotification('discord')">Test Discord</button>
      <button class="btn btn-ghost btn-sm" onclick="testNotification('slack')">Test Slack</button>
      <span id="notif-test-result" style="color:var(--muted);font-size:0.85rem;margin-left:0.5rem"></span>
    </div>`;
  } else if (section === 'memory') {
    html += select('scope', 'Scope', [['project','Project'],['global','Global']], data.scope || 'project');
    html += field('retention_days', 'Retention (days)', 'number', data.retention_days, '90');
    html += `<div class="actions"><button class="btn btn-deny btn-sm" onclick="if(confirm('Clear local memory?'))clearMemoryStore()">Clear Local Memory</button></div>`;
  }

  html += `<div class="actions" style="margin-top:1.5rem">
    <button class="btn btn-primary" onclick="saveSettings('${section}')">Save</button>
    <span id="settings-save-result" style="color:var(--muted);font-size:0.85rem;margin-left:0.5rem"></span>
  </div>`;
  return html;
}

async function saveSettings(section) {
  const resultEl = document.getElementById('settings-save-result');
  const data = {};
  document.querySelectorAll('[id^="setting-"]').forEach(el => {
    const key = el.id.replace('setting-', '');
    data[key] = el.type === 'checkbox' ? el.checked : (el.type === 'number' ? Number(el.value) : el.value);
  });
  try {
    const resp = await fetch('/api/settings/' + section, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });
    const result = await resp.json();
    if (resultEl) {
      resultEl.style.color = resp.ok ? 'var(--green)' : 'var(--red)';
      resultEl.textContent = resp.ok ? 'Saved.' : (result.error || 'Error saving settings.');
    }
  } catch (e) { if (resultEl) { resultEl.style.color = 'var(--red)'; resultEl.textContent = 'Network error'; } }
}

async function testAgentConnection() {
  const framework = document.getElementById('setting-default_framework')?.value || '';
  const el = document.getElementById('agent-test-result');
  try {
    const resp = await fetch('/api/settings/agent/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: framework })
    });
    const data = await resp.json();
    if (el) { el.style.color = resp.ok ? 'var(--green)' : 'var(--red)'; el.textContent = data.message || data.status; }
  } catch (e) { if (el) { el.style.color = 'var(--red)'; el.textContent = 'Network error'; } }
}

async function checkVcsConnection() {
  const url = document.getElementById('setting-remote_url')?.value || '';
  const token = document.getElementById('setting-token')?.value || '';
  const el = document.getElementById('vcs-check-result');
  try {
    const resp = await fetch('/api/settings/vcs/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token })
    });
    const data = await resp.json();
    if (el) { el.style.color = resp.ok ? 'var(--green)' : 'var(--red)'; el.textContent = data.message || data.status; }
  } catch (e) { if (el) { el.style.color = 'var(--red)'; el.textContent = 'Network error'; } }
}

async function testNotification(channel) {
  const tokenEl = document.getElementById('setting-' + channel + '_token');
  const el = document.getElementById('notif-test-result');
  try {
    const resp = await fetch('/api/settings/notifications/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: tokenEl?.value || '', channel })
    });
    const data = await resp.json();
    if (el) { el.style.color = resp.ok ? 'var(--green)' : 'var(--red)'; el.textContent = data.message || data.status; }
  } catch (e) { if (el) { el.style.color = 'var(--red)'; el.textContent = 'Network error'; } }
}

async function clearMemoryStore() {
  try {
    await fetch('/api/memory', { method: 'DELETE' });
    alert('Local memory cleared.');
  } catch (e) { alert('Could not clear memory: ' + e); }
}

async function saveRawConfig() {
  const content = document.getElementById('raw-daemon')?.value || '';
  alert('Raw config save is not yet implemented. Edit .ta/daemon.toml directly and restart the daemon.');
}

// ── Projects (v0.14.18) ───────────────────────────────────────
async function loadProjects() {
  app.innerHTML = '<div class="loading">Loading projects...</div>';
  try {
    const resp = await fetch('/api/project/list');
    const projects = resp.ok ? await resp.json() : [];
    renderProjects(projects);
  } catch (e) {
    renderProjects([]);
  }
}

function renderProjects(projects) {
  let html = '';

  // Recent projects
  html += '<div class="section"><h3>Recent Projects</h3>';
  if (projects.length === 0) {
    html += '<div class="card"><div class="card-meta">No recent projects. Open a project below to get started.</div></div>';
  } else {
    projects.forEach(p => {
      html += `<div class="card clickable" onclick="openProject(${JSON.stringify(p.path)})">
        <div class="card-header"><span class="card-title">${esc(p.name)}</span></div>
        <div class="card-meta">${esc(p.path)} &mdash; ${timeAgo(p.last_opened)}</div>
      </div>`;
    });
  }
  html += '</div>';

  // Open from path
  html += `<div class="section"><h3>Open from Path</h3>
    <div class="card">
      <div class="form-group">
        <label>Project directory (must contain a .ta/ folder)</label>
        <input type="text" id="open-path-input" placeholder="/path/to/your/project" style="font-family:monospace">
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="openProjectFromInput()">Open Project</button>
        <button class="btn btn-ghost" onclick="browseForProject()">Browse\u2026</button>
      </div>
      <div id="open-path-status" style="margin-top:0.75rem;font-size:0.85rem;"></div>
    </div>
  </div>`;

  // Open from Git
  html += `<div class="section"><h3>Open from GitHub / GitLab</h3>
    <div class="card">
      <div class="card-meta" style="padding:0.5rem 0">Clone a repository and open it as a TA project.</div>
      <div class="form-group">
        <label>Repository URL</label>
        <input type="text" id="clone-url-input" placeholder="https://github.com/org/repo">
      </div>
      <div class="actions">
        <button class="btn btn-primary" disabled title="Git clone support coming soon">Clone &amp; Open</button>
      </div>
    </div>
  </div>`;

  app.innerHTML = html;
}

async function openProject(path) {
  try {
    const resp = await fetch('/api/project/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path })
    });
    const result = await resp.json();
    if (result.ok) {
      switchTab('dashboard');
    } else {
      alert('Failed to open project: ' + (result.error || 'Unknown error'));
    }
  } catch (e) {
    alert('Error opening project: ' + e.message);
  }
}

async function openProjectFromInput() {
  const input = document.getElementById('open-path-input');
  const status = document.getElementById('open-path-status');
  const path = input ? input.value.trim() : '';
  if (!path) { if (status) status.textContent = 'Please enter a project path.'; return; }
  if (status) status.textContent = 'Opening...';
  try {
    const resp = await fetch('/api/project/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path })
    });
    const result = await resp.json();
    if (result.ok) {
      switchTab('dashboard');
    } else {
      if (status) { status.textContent = 'Error: ' + (result.error || 'Could not open project.'); status.style.color = 'var(--red)'; }
    }
  } catch (e) {
    if (status) { status.textContent = 'Network error: ' + e.message; status.style.color = 'var(--red)'; }
  }
}

async function browseForProject() {
  try {
    const resp = await fetch('/api/project/browse', { method: 'POST' });
    const result = await resp.json();
    if (!result.cancelled && result.path) {
      const input = document.getElementById('open-path-input');
      if (input) input.value = result.path;
    }
  } catch (e) {
    // Browse not available on this platform - ignore
  }
}

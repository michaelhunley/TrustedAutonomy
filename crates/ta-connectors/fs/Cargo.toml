[package]
name = "ta-connector-fs"
version.workspace = true
edition = "2021"
description = "Filesystem connector for Trusted Autonomy"
license = "Apache-2.0"
repository = "https://github.com/trustedautonomy/ta"
homepage = "https://github.com/trustedautonomy/ta"
keywords = ["ai", "agent", "autonomy", "filesystem", "connector"]
categories = ["development-tools", "filesystem"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
ta-changeset = { path = "../../ta-changeset", version = "0.15.29-alpha" }
ta-workspace = { path = "../../ta-workspace", version = "0.15.29-alpha" }
ta-audit = { path = "../../ta-audit", version = "0.15.29-alpha" }

[dev-dependencies]
tempfile = { workspace = true }
ta-policy = { path = "../../ta-policy", version = "0.15.29-alpha" }

# plan-build-phases-v015.yaml — Run pending v0.15.x phases through v0.15.23
#
# Covers: v0.15.20 (Work Planner), v0.15.21 (Studio Advisor),
#         v0.15.22 (Secret Scan), v0.15.23 (Parameterized Workflow Templates)
# Stops automatically when no more v0.15.x pending phases exist or max_phases reached.
workflow:
  name: plan-build-phases-v015
  description: |
    PR-per-phase build loop scoped to v0.15.x phases only.
    Stops automatically when no more v0.15.x pending phases exist.
  config:
    max_phases: 4
    stop_on_flag: true

stages:
  - name: plan_next
    kind: plan_next
    phase_filter: v0.15
    description: "Get next pending v0.15.x phase."

  - name: run_phase
    kind: workflow
    workflow: build
    goal: "{{plan_next.phase_id}} — {{plan_next.phase_title}}"
    phase: "{{plan_next.phase_id}}"
    condition: "!plan_next.done"
    depends_on:
      - plan_next
    description: "Run governed build workflow for this phase."

  - name: loop
    kind: goto
    target: plan_next
    condition: "!plan_next.done"
    depends_on:
      - run_phase
    description: "Loop until all v0.15.x phases complete or max_phases reached."

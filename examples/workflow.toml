# .ta/workflow.toml — Submit adapter configuration for Trusted Autonomy.
#
# Copy this file to your project's .ta/ directory:
#   mkdir -p .ta && cp examples/workflow.toml .ta/workflow.toml
#
# Without this file, `ta pr apply` only copies files back to your project.
# With it, apply can automatically commit, push, and open a PR.

# ────────────────────────────────────────────────────────────────────
# Agent Model Selection
# ────────────────────────────────────────────────────────────────────
# TA uses the `claude` CLI (Claude Code) as its default agent.
# The model is selected by the Claude CLI itself — set it via env var:
#
#   export ANTHROPIC_MODEL=claude-sonnet-4-6    # balanced (default for most use)
#   export ANTHROPIC_MODEL=claude-opus-4-6      # highest quality, slower, more tokens
#   export ANTHROPIC_MODEL=claude-haiku-4-5-20251001  # fastest, lowest cost
#
# Or set it permanently in your shell profile / CI environment.
# The model selection does NOT go in workflow.toml — it is a Claude Code setting.
#
# For the supervisor agent (post-agent constitution review), configure below.
# ────────────────────────────────────────────────────────────────────

[submit]
adapter = "git"          # "git" or "none" (default: "none")
auto_commit = true       # Commit on every `ta pr apply`
auto_push = true         # Push to remote after commit
auto_review = true       # Open a PR/review after push (requires `gh` CLI)

[submit.git]
branch_prefix = "ta/"              # Branch naming: ta/<goal-slug>
target_branch = "main"             # PR target branch
merge_strategy = "squash"          # squash, merge, or rebase
remote = "origin"                  # Git remote name
pr_template = ".ta/pr-template.md" # PR body template (see examples/pr-template.md)

# ────────────────────────────────────────────────────────────────────
# Constitution / Compliance Checker Configuration (v0.12.0)
# ────────────────────────────────────────────────────────────────────
# These options are project-specific and disabled by default.
# External projects should leave this section unset.
# The TA repo enables s4_scan to catch inject_*/restore_* imbalances.

[constitution]
# Scan changed .rs files for §4 inject_*/restore_* imbalance (TA project only).
# Set to true in the TA repo's .ta/workflow.toml, leave false everywhere else.
s4_scan = false

# ────────────────────────────────────────────────────────────────────
# Diff Viewing Configuration (v0.2.2)
# ────────────────────────────────────────────────────────────────────

[diff]
# Open files in external handlers by default when using `ta pr view --file`
# If false, always show inline diffs (or [binary: size] for binaries)
# CLI flag --open-external / --no-open-external overrides this setting
open_external = true

# Optional: Override default path to diff-handlers.toml
# handlers_file = ".ta/diff-handlers.toml"

# ────────────────────────────────────────────────────────────────────
# Draft Lifecycle / Garbage Collection Configuration (v0.3.6)
# ────────────────────────────────────────────────────────────────────

[gc]
# Days after which terminal-state drafts' staging dirs are eligible for cleanup.
# Affects `ta draft gc`. Default: 7.
stale_threshold_days = 7

# Show a one-line warning on `ta` startup if stale drafts exist
# (approved but not applied for 3+ days). Default: true.
health_check = true

# ────────────────────────────────────────────────────────────────────
# Supervisor Agent (Post-Agent Constitution Review)
# ────────────────────────────────────────────────────────────────────
# The supervisor runs a second Claude Code pass after the main agent exits,
# checking the draft against your constitution (if present). Default: builtin
# (uses the same `claude` CLI and ANTHROPIC_MODEL env var as the main agent).

# [supervisor]
# enabled = true
# agent = "builtin"         # "builtin" / "claude-code" (default), "codex", "ollama/<model>"
# verdict_on_block = "warn" # "warn" = show in draft view only; "block" = require --override to approve
# skip_if_no_constitution = true
# timeout_secs = 120

# ────────────────────────────────────────────────────────────────────
# Pre-Draft Verification Gate
# ────────────────────────────────────────────────────────────────────
# Commands run in the staging workspace after agent exit, before `ta draft build`.
# Non-zero exit blocks approval unless `--override` is passed.

# [verify]
# commands = [
#     "cargo build --workspace",   # Rust projects
#     "cargo test --workspace",
#     # "npm run build",           # TypeScript/Node
#     # "python -m py_compile src/**/*.py",  # Python
# ]
# on_failure = "block"  # "block" (default) or "warn"

# ────────────────────────────────────────────────────────────────────
# Sandbox (Agent Environment Isolation)
# ────────────────────────────────────────────────────────────────────
# Controls what the agent can access at runtime.

# [sandbox]
# network = "none"         # "none" (default, blocks outbound) or "allow"
# fs_write_outside = "deny"  # "deny" (default) or "allow"

# ────────────────────────────────────────────────────────────────────
# Desktop Notifications
# ────────────────────────────────────────────────────────────────────
# Notify when a goal finishes or a draft is ready for review.

# [notify]
# on_complete = true
# on_error = true
# sound = false

# ────────────────────────────────────────────────────────────────────
# VCS Agent Isolation
# ────────────────────────────────────────────────────────────────────
# Controls the agent's Git environment inside the staging workspace.
# Defaults are safe for most projects — no need to set unless you have
# a specific reason (e.g., agent needs to read git history for blame).

# [vcs.agent]
# git_mode = "isolated"      # "isolated" (default), "inherit-read", "none"
# init_baseline_commit = true  # Give agent a clean git baseline to diff against
# ceiling_always = true       # Block git traversal into parent dirs

# ────────────────────────────────────────────────────────────────────
# Draft Apply Conflict Resolution
# ────────────────────────────────────────────────────────────────────
# Resolve conflicts when both the agent and a concurrent commit touched the
# same file. Uncomment and tune for your project.

# [apply.conflict_policy]
# default = "merge"           # attempt 3-way merge (safest for most files)
# "PLAN.md" = "keep-source"  # TA-managed file — never let agent overwrite
# "Cargo.lock" = "keep-source"  # auto-generated by cargo, discard agent's
# "src/**" = "abort"          # code conflicts need human review

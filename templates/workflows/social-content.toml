# social-content.toml — Social Media Content Workflow config template (v0.15.12).
#
# Copy this file to one of:
#   ~/.config/ta/workflows/social-content.toml   (user-global — recommended)
#   .ta/workflows/social-content.toml            (project-local)
#
# Or run: ta workflow init social-content
# to have TA create both this config and a starter voice constitution for you.

[workflow]
name            = "social-content"

# Platforms to post to. Each platform must have a configured adapter.
# Use a single platform: platforms = ["linkedin"]
# Use Buffer for cross-platform fan-out: platforms = ["buffer"]
# Use multiple adapters (one draft per platform): platforms = ["linkedin", "x"]
platforms       = ["linkedin"]

# How posts are created:
#   "draft"     — create native draft in platform UI (user publishes manually)
#   "scheduled" — schedule posts via platform scheduler or Buffer queue
mode            = "draft"

# Path to your social media voice constitution.
# Defines your tone, style, topics, and what NOT to post.
# Run 'ta workflow init social-content' to create a starter constitution.
constitution    = "~/.config/ta/social-constitution.md"

# Allow platform handles and account names in posts?
# Set to true if your posts regularly mention other accounts by name.
allow_handles   = true

# Allow client or company names that are normally blocked?
# Default false — override per-goal with a goal flag.
allow_client_names = false

[supervisor]
# Confidence below this threshold → review queue instead of posting.
# Range: 0.0 – 1.0. Raise to be more conservative.
min_confidence  = 0.80

# Always flag if the post body contains any of these phrases.
flag_if_contains = [
    "I guarantee",
    "100% proven",
    "guaranteed results",
    "legally binding",
]

# Check for patterns that look like unverified claims?
check_unverified_claims = true

# ── Scheduling ───────────────────────────────────────────────────────────────
# Only used when mode = "scheduled".

[schedule]
# Time zone for interpreting relative times.
timezone        = "America/Los_Angeles"

# Default time to schedule posts (24h format, local time).
# Used when the goal doesn't specify an exact time.
default_time    = "09:00"

# For multi-post goals (e.g., a week of X posts), space posts this far apart.
# Formats: "1d", "2d", "1w"
post_spacing    = "1d"

# ── Content guidelines ───────────────────────────────────────────────────────
# These are injected into every content goal's system prompt.

[content]
# Maximum post length in characters (platform limits enforced by plugin).
# LinkedIn: 3000, X: 280, Instagram: 2200
max_length      = 2200

# Whether to include hashtags. The constitution controls which tags are preferred.
include_hashtags = true

# Number of hashtags per post (0 = let the constitution decide).
hashtag_count   = 3

# Include a call-to-action? (e.g., "Link in bio", "Try it at...")
include_cta     = false

# ── Example goals that use this workflow ─────────────────────────────────────
#
# Single post:
#   ta run "Draft a LinkedIn post about the cinepipe project launch — professional
#           tone, highlight the AI pipeline angle, no specific client names"
#
# Weekly series:
#   ta run "Write a week of X posts for the TA public alpha — one per day,
#           consistent voice, link to the GitHub release"
#           --persona content-writer
#
# Multi-platform via Buffer:
#   ta run "Announce our new feature: social media adapter support in TA v0.15.12"
#   (with platforms = ["buffer"] this fans out to LinkedIn + X + Instagram at once)

# code-review-consensus.toml — Multi-agent panel review workflow (v0.15.15).
#
# Four specialist agents run in parallel, each reviewing the staged changes
# from their domain perspective. A consensus step aggregates their scores
# into a single readiness score and proceed/block decision.
#
# Roles:
#   - architect:  system design, modularity, API contracts
#   - security:   OWASP top-10, trust boundaries, secrets handling
#   - principal:  correctness, edge cases, test coverage, maintainability
#   - pm:         goal alignment, scope, user impact, backwards compatibility
#
# Usage:
#   ta workflow run code-review-consensus --goal "Add rate limiting to auth"
#
# The run blocks apply if consensus score < gate_threshold.
# Use --override --override-reason "..." to bypass with an audit entry.
#
# Live status:
#   ta workflow status <run-id> --live
#
# See docs/USAGE.md "Multi-Agent Consensus Review" for full documentation.

[workflow]
name = "code-review-consensus"
description = """
Multi-agent panel review. Four specialist agents review the staged changes
in parallel — architect (design), security (threats), principal (correctness),
PM (product fit). Their scores are aggregated into a consensus readiness score
(0.0–1.0). Apply is blocked when score < gate_threshold.
"""

[workflow.config]
# Minimum consensus score to auto-proceed with apply. Range: 0.0–1.0.
gate_threshold = 0.75

# How long to wait for each reviewer before treating the slot as a timeout.
reviewer_timeout_mins = 30

# Consensus algorithm: raft | paxos | weighted
#
#   raft     — Crash-fault-tolerant log replication. Majority quorum commits
#              each reviewer's entry. Log persisted for crash recovery.
#              Recommended for panels of 3+ reviewers.
#
#   paxos    — Single-decree consensus. Prepare/promise/accept/accepted phases.
#              Suitable when only one round of agreement is needed.
#
#   weighted — Simple weighted average. No coordination overhead.
#              Auto-selected when only one reviewer is active.
consensus_algorithm = "raft"

# When false, a timed-out reviewer reduces the quorum (slot omitted) but does
# not fail the run. When true, any timeout is a hard failure.
require_all_reviewers = false

# Per-role weights applied to the consensus score calculation.
# Unspecified roles default to 1.0.
[workflow.config.weights]
architect = 1.0
security  = 1.5   # security findings are weighted higher
principal = 1.0
pm        = 0.5

# ── Reviewer stages (run in parallel) ───────────────────────────────────────
#
# Each reviewer runs as a headless agent in the staging workspace with
# Read/Grep/Glob tool access. They write structured output to:
#   .ta/review/<role>/verdict.json
#
# The consensus step reads these outputs after all reviewers complete.

[[stages]]
name = "architect_review"
description = """
Architect reviewer. Focus: system design quality, modularity, coupling,
dependency graph, API contracts, consistency with existing patterns.
Score 0.0–1.0. Cite file:line for each finding.
"""
parallel_group = "panel"

[[stages]]
name = "security_review"
description = """
Security reviewer. Focus: OWASP top-10, trust boundaries, input validation,
secrets handling, authentication/authorization, injection risks.
Score 0.0–1.0. Cite file:line for each finding.
"""
parallel_group = "panel"

[[stages]]
name = "principal_review"
description = """
Principal engineer reviewer. Focus: correctness, edge cases, error handling,
test coverage, performance implications, code maintainability.
Score 0.0–1.0. Cite file:line for each finding.
"""
parallel_group = "panel"

[[stages]]
name = "pm_review"
description = """
Product manager reviewer. Focus: goal alignment, scope, user-visible impact,
backwards compatibility, documentation, migration path.
Score 0.0–1.0. Note any scope concerns.
"""
parallel_group = "panel"

# ── Consensus stage ──────────────────────────────────────────────────────────
#
# Reads score + findings from each reviewer stage output. Applies the
# configured consensus algorithm and weights. Produces a single
# ConsensusResult with: score, proceed, scores_by_role, findings_by_role.
#
# Blocks apply if proceed = false (unless --override is used).

[[stages]]
name = "consensus"
kind = "consensus"
description = """
Aggregate reviewer scores using the configured consensus algorithm.
Computes weighted score and applies gate_threshold. Blocks apply on failure.
"""
parallel_group = "panel"
depends_on = ["architect_review", "security_review", "principal_review", "pm_review"]

# ── Apply stage ───────────────────────────────────────────────────────────────

[[stages]]
name = "apply"
kind = "apply_draft"
description = "Apply the approved draft to source. Only runs when consensus.proceed = true."
depends_on = ["consensus"]
condition = "consensus.proceed"

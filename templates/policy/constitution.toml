# .ta/constitution.toml — TA Email and Action Policy Constitution
#
# Copy this to .ta/constitution.toml to customize policy rules for your project.
# Default rules (below) are always active even without this file.
#
# Rule types:
#   [[rules.block]] — fail the action with a clear error message
#   [[rules.warn]]  — allow but log a warning
#
# Conditions (string, evaluated by TA at action dispatch time):
#   "policy_is_not_review" — fires when the action's policy is not "review"
#   "always"               — always fires

# ── Default: block email auto-send ──────────────────────────────────
# This rule is always active (even without this file).
# Override by changing to [[rules.warn]] with allow_override = true.
[[rules.block]]
action_type = "email"
condition   = "policy_is_not_review"
message     = "Email actions must use policy = review — TA never sends email autonomously. Drafts are created in your Drafts folder for you to review and send."
allow_override = false

# ── Example: warn on social posts ──────────────────────────────────
# [[rules.warn]]
# action_type = "social_post"
# condition   = "always"
# message     = "Social media posts require supervisor review before publishing."
# allow_override = true

# ── PLAN.md merge validation (v0.15.28.1) ──────────────────────────
# Requires that `ta draft apply` always runs PLAN.md structural validation.
# Blocks applies where the 3-way merge drops headings or status markers.
# Exception: --skip-plan-merge flag (logged to audit trail with reason).
[rules.plan-merge-validation]
severity    = "block"
description = "PLAN.md structural validation must pass on every draft apply"
exception   = "--skip-plan-merge flag (emergency use only — logged to audit trail)"

# ── Release pipeline authority (v0.15.30.2) ─────────────────────────
# Declares `ta release run` as the authoritative release mechanism.
# Agents must not create GitHub releases, push tags, or bump Cargo.toml
# versions outside the pipeline. Direct git-push of tags or manual
# `gh release create` calls bypass the approval gates and clean-check step.
[rules.release-pipeline]
severity    = "block"
description = "ta release run is the authoritative release mechanism — agents must not push tags, create GitHub releases, or bump versions outside the release pipeline"
exception   = "hotfix emergency acknowledged via explicit --skip-release-pipeline flag (logged to audit trail)"

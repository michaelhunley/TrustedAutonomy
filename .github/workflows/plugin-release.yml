# Plugin Release — Build and publish plugin binaries for all platforms.
#
# Triggered when a tag matching `plugin-*-v*` is pushed (e.g., `plugin-discord-v0.1.0`).
# Builds the plugin for all supported platforms and uploads the binaries
# as GitHub release assets, making them available for `ta setup resolve`.
#
# Tag format: plugin-<name>-v<version>
# Example:    plugin-discord-v0.1.0
#             plugin-slack-v0.2.0

name: Plugin Release

on:
  push:
    tags:
      - 'plugin-*-v*'

permissions:
  contents: write

jobs:
  # Extract plugin name and version from the tag.
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      plugin_name: ${{ steps.parse.outputs.plugin_name }}
      plugin_version: ${{ steps.parse.outputs.plugin_version }}
      plugin_dir: ${{ steps.parse.outputs.plugin_dir }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # plugin-discord-v0.1.0 → name=discord, version=0.1.0
          PLUGIN_NAME=$(echo "$TAG" | sed 's/^plugin-//' | sed 's/-v[0-9].*//')
          PLUGIN_VERSION=$(echo "$TAG" | sed 's/.*-v//')
          echo "plugin_name=ta-channel-${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "plugin_version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "plugin_dir=plugins/ta-channel-${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building ${PLUGIN_NAME} v${PLUGIN_VERSION}"

  build:
    needs: parse-tag
    strategy:
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13          # Intel Mac
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build plugin
        run: |
          cd ${{ needs.parse-tag.outputs.plugin_dir }}
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          PLUGIN=${{ needs.parse-tag.outputs.plugin_name }}
          VERSION=${{ needs.parse-tag.outputs.plugin_version }}
          TARGET=${{ matrix.target }}
          BINARY="${{ needs.parse-tag.outputs.plugin_dir }}/target/${TARGET}/release/${PLUGIN}"
          MANIFEST="${{ needs.parse-tag.outputs.plugin_dir }}/channel.toml"

          TARBALL="${PLUGIN}-${VERSION}-${TARGET}.tar.gz"
          tar czf "${TARBALL}" -C "$(dirname ${BINARY})" "$(basename ${BINARY})" -C "${GITHUB_WORKSPACE}/${{ needs.parse-tag.outputs.plugin_dir }}" channel.toml
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

          # Generate SHA-256.
          shasum -a 256 "${TARBALL}" | awk '{print $1}' > "${TARBALL}.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $PLUGIN = "${{ needs.parse-tag.outputs.plugin_name }}"
          $VERSION = "${{ needs.parse-tag.outputs.plugin_version }}"
          $TARGET = "${{ matrix.target }}"
          $BINARY = "${{ needs.parse-tag.outputs.plugin_dir }}/target/${TARGET}/release/${PLUGIN}.exe"
          $MANIFEST = "${{ needs.parse-tag.outputs.plugin_dir }}/channel.toml"

          $TARBALL = "${PLUGIN}-${VERSION}-${TARGET}.tar.gz"
          tar czf $TARBALL -C (Split-Path $BINARY) (Split-Path -Leaf $BINARY) -C "${{ needs.parse-tag.outputs.plugin_dir }}" channel.toml
          echo "TARBALL=${TARBALL}" >> $env:GITHUB_ENV

          (Get-FileHash -Algorithm SHA256 $TARBALL).Hash.ToLower() | Out-File "${TARBALL}.sha256" -NoNewline

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release (default: false — release is marked as latest)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ta

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # macOS — build both architectures on macos-latest (ARM)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          # Linux builds (musl for static binaries)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Windows (v0.9.1)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (native)
        if: matrix.cross == false
        run: |
          cargo build --release --target ${{ matrix.target }} -p ta-cli
          cargo build --release --target ${{ matrix.target }} -p ta-daemon
          cargo build --release --target ${{ matrix.target }} -p ta-agent-ollama

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --release --target ${{ matrix.target }} -p ta-cli
          cross build --release --target ${{ matrix.target }} -p ta-daemon
          cross build --release --target ${{ matrix.target }} -p ta-agent-ollama

      - name: Package binary with docs (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} staging/
          cp target/${{ matrix.target }}/release/ta-daemon staging/
          cp target/${{ matrix.target }}/release/ta-agent-ollama staging/ 2>/dev/null || true
          # Stamp the release version into USAGE.md before packaging
          if [ -f docs/USAGE.md ]; then
            sed "s/^\*\*Version\*\*:.*/**Version**: ${{ steps.get_version.outputs.version }}/" \
              docs/USAGE.md > staging/USAGE.md
          fi
          # Generate USAGE.html — --embed-resources: CSS inline, works offline, matches MSI bundle
          if command -v pandoc >/dev/null 2>&1; then
            pandoc staging/USAGE.md --standalone --embed-resources \
              --metadata title="Trusted Autonomy Usage Guide" \
              -o staging/USAGE.html
          else
            printf '<!DOCTYPE html><html><meta charset="utf-8"><title>Trusted Autonomy Usage Guide</title><body><pre>%s</pre></body></html>' \
              "$(cat staging/USAGE.md)" > staging/USAGE.html
          fi
          cp DISCLAIMER.md staging/ 2>/dev/null || true
          cp LICENSE staging/ 2>/dev/null || true
          cp .release-draft.md staging/RELEASE-NOTES.md 2>/dev/null || true
          # Include vcs-perforce plugin
          mkdir -p staging/plugins/vcs
          if [ -f plugins/vcs-perforce ]; then
            cp plugins/vcs-perforce staging/plugins/vcs/
            chmod +x staging/plugins/vcs/vcs-perforce
          fi
          if [ -f plugins/vcs-perforce.toml ]; then
            cp plugins/vcs-perforce.toml staging/plugins/vcs/
          fi
          mkdir -p artifacts
          cd staging
          tar czf ../artifacts/${{ env.BINARY_NAME }}-${{ steps.get_version.outputs.version }}-${{ matrix.target }}.tar.gz *

      - name: Validate tarball contains vcs-perforce (Unix)
        if: runner.os != 'Windows'
        run: |
          tarball=$(ls artifacts/*.tar.gz 2>/dev/null | head -1)
          if [ -n "$tarball" ]; then
            tar tzf "$tarball" | grep -q "plugins/vcs/vcs-perforce" && echo "✓ vcs-perforce found in tarball" || echo "⚠ vcs-perforce not found in tarball (non-fatal)"
          fi

      - name: Install pandoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress | Out-Null
          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          pandoc --version | Select-Object -First 1

      - name: Package binary with docs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          New-Item -ItemType Directory -Force -Path staging, artifacts | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/ta-daemon.exe" staging/
          if (Test-Path "target/${{ matrix.target }}/release/ta-agent-ollama.exe") {
            Copy-Item "target/${{ matrix.target }}/release/ta-agent-ollama.exe" staging/
          }
          # Stamp the release version into USAGE.md before packaging
          if (Test-Path "docs/USAGE.md") {
            (Get-Content "docs/USAGE.md") -replace '^\*\*Version\*\*:.*', "**Version**: ${{ steps.get_version.outputs.version }}" |
              Set-Content "staging/USAGE.md"
          }
          # Generate USAGE.html -- same command as MSI bundle and loose artifact
          pandoc "staging\USAGE.md" --standalone --embed-resources `
            --metadata title="Trusted Autonomy Usage Guide" `
            -o "staging\USAGE.html"
          foreach ($f in @("DISCLAIMER.md", "LICENSE", ".release-draft.md")) {
            if (Test-Path $f) { Copy-Item $f staging/ }
          }
          Compress-Archive -Path staging/* -DestinationPath "artifacts/${{ env.BINARY_NAME }}-${{ steps.get_version.outputs.version }}-${{ matrix.target }}.zip"

      # ── Windows MSI ───────────────────────────────────────────────────────────
      - name: Build Windows MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          # Install WiX v4 .NET global tool (~10s; windows-latest ships .NET SDK).
          # Pin to v4.x — v5+ requires OSMF EULA acceptance and uses a different schema.
          dotnet tool install --global wix --version "4.*"

          # Extract version digits from any tag format:
          # "v0.13.12-alpha" → "0.13.12.0"
          # "public-alpha-v0.13.12" → "0.13.12.0"
          $versionMatch = [regex]::Match("$env:TAG", 'v?(\d+\.\d+\.\d+)')
          if (-not $versionMatch.Success) {
            Write-Error "Could not extract version from tag '$env:TAG' — aborting MSI build"
            exit 1
          }
          $msiVersion = $versionMatch.Groups[1].Value + ".0"
          Write-Host "MSI version: $msiVersion (from tag $env:TAG)"

          # Generate USAGE.html into the release dir for bundling in the MSI.
          # main.wxs references $(var.SourceDir)\USAGE.html as a required file.
          $releaseDir = "target\x86_64-pc-windows-msvc\release"

          # Pandoc installed in the prior "Install pandoc (Windows)" step.
          $env:PATH = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')

          # Stamp the release version and generate self-contained HTML.
          $stampedMd = "staging-usage.md"
          (Get-Content "docs\USAGE.md") -replace '^\*\*Version\*\*:.*', "**Version**: $env:TAG" |
            Set-Content $stampedMd -Encoding utf8
          pandoc $stampedMd --standalone --embed-resources `
            --metadata title="Trusted Autonomy Usage Guide" `
            -o "$releaseDir\USAGE.html"

          # Copy ta-studio.bat launcher for MSI bundling.
          if (Test-Path "scripts\ta-studio.bat") {
            Copy-Item "scripts\ta-studio.bat" "$releaseDir\ta-studio.bat"
          }

          # Copy ta-agent-ollama.exe for MSI bundling.
          if (Test-Path "$releaseDir\ta-agent-ollama.exe") {
            Write-Host "ta-agent-ollama.exe already in release dir"
          } else {
            Write-Host "ta-agent-ollama.exe not found — local model support will not be bundled in MSI"
          }

          # Copy vcs-perforce plugin files for MSI bundling.
          New-Item -ItemType Directory -Force -Path "$releaseDir\plugins\vcs" | Out-Null
          if (Test-Path "plugins\vcs-perforce") {
            Copy-Item "plugins\vcs-perforce" "$releaseDir\plugins\vcs\vcs-perforce"
          }
          if (Test-Path "plugins\vcs-perforce.toml") {
            Copy-Item "plugins\vcs-perforce.toml" "$releaseDir\plugins\vcs\vcs-perforce.toml"
          }

          # Build the MSI with WiX v4 directly (main.wxs uses v4 schema).
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          wix build apps/ta-cli/wix/main.wxs `
            -d SourceDir="$releaseDir" `
            -d Version="$msiVersion" `
            -d Platform=x64 `
            -arch x64 `
            -o "artifacts\${{ env.BINARY_NAME }}-$env:TAG-x86_64-pc-windows-msvc.msi"
          Write-Host "MSI created: artifacts\${{ env.BINARY_NAME }}-$env:TAG-x86_64-pc-windows-msvc.msi"

      # ── macOS pkg + DMG (v0.13.11) ───────────────────────────────────────────
      # Build on ARM runner (aarch64-apple-darwin) — one DMG covers both arches.
      - name: Build macOS pkg and DMG
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          TAG: ${{ steps.get_version.outputs.version }}
          APPLE_DEVELOPER_CERT: ${{ secrets.APPLE_DEVELOPER_CERT }}
        run: |
          set -euo pipefail

          # Ensure create-dmg is available.
          brew install create-dmg 2>/dev/null || true

          VERSION="${TAG#v}"
          PKG_NAME="ta-${TAG}-macos"
          PKG_ROOT="pkgbuild-root"
          mkdir -p "${PKG_ROOT}/usr/local/bin"

          # Install binaries into the pkg root.
          cp "target/${{ matrix.target }}/release/ta" "${PKG_ROOT}/usr/local/bin/"
          cp "target/${{ matrix.target }}/release/ta-daemon" "${PKG_ROOT}/usr/local/bin/"
          if [ -f "target/${{ matrix.target }}/release/ta-agent-ollama" ]; then
            cp "target/${{ matrix.target }}/release/ta-agent-ollama" "${PKG_ROOT}/usr/local/bin/"
            chmod +x "${PKG_ROOT}/usr/local/bin/ta-agent-ollama"
          fi
          chmod +x "${PKG_ROOT}/usr/local/bin/ta" "${PKG_ROOT}/usr/local/bin/ta-daemon"

          # Component package.
          pkgbuild \
            --root "${PKG_ROOT}" \
            --identifier "io.trustedautonomy.ta" \
            --version "${VERSION}" \
            --install-location "/" \
            "ta-component.pkg"

          # Distribution XML for productbuild.
          cat > distribution.xml <<'DISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>Trusted Autonomy</title>
            <welcome file="welcome.html" mime-type="text/html"/>
            <options customize="never" require-scripts="false"/>
            <choices-outline>
              <line choice="default">
                <line choice="io.trustedautonomy.ta"/>
              </line>
            </choices-outline>
            <choice id="default"/>
            <choice id="io.trustedautonomy.ta" visible="false">
              <pkg-ref id="io.trustedautonomy.ta"/>
            </choice>
            <pkg-ref id="io.trustedautonomy.ta" version="${VERSION}" onConclusion="none">ta-component.pkg</pkg-ref>
          </installer-gui-script>
          DISTEOF

          # Simple welcome HTML.
          cat > welcome.html <<'EOF'
          <html><body>
          <h2>Trusted Autonomy</h2>
          <p>This package installs <code>ta</code> and <code>ta-daemon</code> to <code>/usr/local/bin/</code>.</p>
          <p>After installation, run <code>ta setup</code> to configure your agent.</p>
          </body></html>
          EOF

          # Build flat pkg.
          productbuild \
            --distribution distribution.xml \
            --package-path . \
            "${PKG_NAME}.pkg"

          # Optionally sign (if cert is present).
          if [ -n "${APPLE_DEVELOPER_CERT:-}" ]; then
            echo "Code signing not yet configured — add APPLE_DEVELOPER_CERT secret to enable."
          fi

          mkdir -p artifacts

          # Wrap in DMG.
          if command -v create-dmg >/dev/null 2>&1; then
            create-dmg \
              --volname "Trusted Autonomy ${VERSION}" \
              --window-size 520 300 \
              --icon-size 96 \
              --app-drop-link 380 150 \
              "artifacts/${PKG_NAME}.dmg" \
              "${PKG_NAME}.pkg" || {
                # create-dmg can exit non-zero on minor warnings; copy pkg directly.
                echo "create-dmg exited non-zero; copying .pkg as fallback"
                cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.dmg"
              }
          else
            echo "create-dmg not available; using raw .pkg as DMG fallback"
            cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.dmg"
          fi

          # Also ship the flat pkg alongside the DMG.
          cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.pkg"
          echo "macOS installer: artifacts/${PKG_NAME}.dmg"

      - name: Generate SHA256 checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS-${{ matrix.target }}.txt
          else
            shasum -a 256 * > SHA256SUMS-${{ matrix.target }}.txt
          fi

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd artifacts
          # Explicitly hash only archive files — avoids reading the checksum output file
          # (Get-FileHash * races with its own output file being written).
          $files = @(Get-ChildItem -Filter "*.zip") + @(Get-ChildItem -Filter "*.msi")
          if ($files.Count -eq 0) {
            Write-Warning "No zip/msi files found in artifacts — skipping checksum"
          } else {
            Get-FileHash $files -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding ascii "SHA256SUMS-${{ matrix.target }}.txt"
          }

      - name: Generate HTML docs (macOS Intel only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install pandoc
          # Use the version-stamped copy from staging/
          # --embed-resources: all CSS embedded inline — same output as MSI-bundled USAGE.html
          pandoc staging/USAGE.md --standalone --embed-resources \
            --metadata title="Trusted Autonomy Usage Guide" \
            -o artifacts/USAGE.html
          pandoc DISCLAIMER.md --standalone --embed-resources \
            --metadata title="Trusted Autonomy Terms of Use" \
            -o artifacts/DISCLAIMER.html
          cp staging/USAGE.md artifacts/USAGE.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: artifacts/

  # Gate job: ensures ALL platform builds pass before publishing.
  # Prevents partial releases with missing platform binaries.
  release-gate:
    name: Release Gate (all platforms must pass)
    needs: build-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds succeeded
        run: |
          if [ "${{ needs.build-release.result }}" != "success" ]; then
            echo "One or more platform builds failed. Blocking release."
            echo "Build result: ${{ needs.build-release.result }}"
            exit 1
          fi
          echo "All platform builds passed. Proceeding to publish."

  publish-release:
    name: Publish Release
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd artifacts
          cat SHA256SUMS-*.txt > SHA256SUMS.txt
          rm -f SHA256SUMS-*.txt

      - name: Build release body
        id: release_body
        run: |
          TAG="${{ steps.get_version.outputs.version }}"

          # Read metadata from .release.toml (single source of truth for non-semver fields).
          # Fall back to empty string if a field is absent so the release never fails silently.
          read_toml() {
            local key="$1"
            grep "^${key}" .release.toml 2>/dev/null \
              | head -1 \
              | sed 's/^[^=]*= *"\(.*\)"/\1/'
          }
          TITLE_SUFFIX="$(read_toml title_suffix)"
          CHANGES_SINCE="$(read_toml changes_since)"
          LAST_RELEASE_TAG="$(read_toml last_release_tag)"

          # Extract semver from tag (strips leading non-numeric prefix like "public-alpha-v").
          CURRENT_VERSION=$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9].*')

          # Expand template tokens in .release-draft.md, then build the body.
          BODY=""
          if [ -f .release-draft.md ]; then
            BODY=$(cat .release-draft.md \
              | sed "s/\${current_version}/${CURRENT_VERSION}/g" \
              | sed "s/\${title_suffix}/${TITLE_SUFFIX}/g" \
              | sed "s/\${changes_since}/${CHANGES_SINCE}/g" \
              | sed "s/\${last_release_tag}/${LAST_RELEASE_TAG}/g")
            # Append separator — use $'...' to keep --- off its own line in YAML
            # (a bare --- at the start of a YAML literal block line is parsed as
            # a document separator, truncating the generated shell script).
            BODY="${BODY}"$'\n\n---\n\n'
          fi

          # Append installation instructions
          BODY="${BODY}### Installation

          **macOS** (recommended)
          Download \`ta-${TAG}-macos.dmg\` below, open it, and run the installer. TA installs to \`/usr/local/bin/ta\`.

          **Windows** (recommended)
          Download \`ta-${TAG}-x86_64-pc-windows-msvc.msi\` below and run it. TA installs to \`%ProgramFiles%\\TrustedAutonomy\\\` and adds itself to PATH. Alternatively, use the \`.zip\` for manual installation.

          **Linux**
          \`\`\`bash
          # x86_64
          curl -L https://github.com/Trusted-Autonomy/TrustedAutonomy/releases/download/${TAG}/ta-${TAG}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ta /usr/local/bin/
          \`\`\`

          **Cargo**
          \`\`\`bash
          cargo install ta-cli
          \`\`\`

          **Nix**
          \`\`\`bash
          nix run github:trustedautonomy/ta
          \`\`\`

          On first run, \`ta\` will prompt you to review and accept the terms of use.

          ### Documentation

          - [USAGE.md](https://github.com/trustedautonomy/ta/blob/main/docs/USAGE.md) — Complete usage guide
          - [DISCLAIMER.md](https://github.com/trustedautonomy/ta/blob/main/DISCLAIMER.md) — Terms of use"

          # Write to file for the release action (handles multiline safely)
          echo "$BODY" > release-body.md

      - name: Validate artifacts before publish
        env:
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          # Verify all platform archives exist locally before touching GitHub.
          # This catches missing builds before we create any release object.
          REQUIRED=(
            "ta-${TAG}-aarch64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-aarch64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-x86_64-pc-windows-msvc.zip"
            "ta-${TAG}-x86_64-pc-windows-msvc.msi"
            "SHA256SUMS.txt"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "artifacts/$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing build artifacts (upload step failed?):"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            exit 1
          fi
          echo "All ${#REQUIRED[@]} required artifacts present locally."

          # Report optional installers (non-fatal if absent).
          OPTIONAL=(
            "ta-${TAG}-macos.dmg"
          )
          for f in "${OPTIONAL[@]}"; do
            if [ -f "artifacts/$f" ]; then
              echo "  ✓ optional: $f"
            else
              echo "  (skipped): $f — not present (installer build may have been skipped)"
            fi
          done

      - name: Publish GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_version.outputs.version }}
          IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
        run: |
          # Create as draft first so assets can be uploaded before the release is
          # immutably published (repositories with "immutable releases" enabled reject
          # asset uploads after a release is published).
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Build release title from .release.toml title_suffix + extracted semver.
          TITLE_SUFFIX=$(grep '^title_suffix' .release.toml 2>/dev/null \
            | head -1 | sed 's/^[^=]*= *"\(.*\)"/\1/')
          CURRENT_VERSION=$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9].*')
          if [ -n "$TITLE_SUFFIX" ]; then
            RELEASE_TITLE="TA v${CURRENT_VERSION} — ${TITLE_SUFFIX}"
          else
            RELEASE_TITLE="TA ${TAG}"
          fi

          gh release create "$TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file release-body.md \
            --draft \
            $PRERELEASE_FLAG

          # Upload all artifacts to the draft release.
          gh release upload "$TAG" artifacts/* --clobber

          # Publish the draft (makes it visible and immutable).
          # Do not pass --latest for prerelease builds — GitHub rejects it.
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --draft=false
          else
            gh release edit "$TAG" --draft=false --latest
          fi

      - name: Validate release assets on GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          echo "Waiting for asset propagation..."
          sleep 5
          ASSETS=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          echo "Attached assets: $ASSETS"

          REQUIRED=(
            "ta-${TAG}-aarch64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-aarch64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-x86_64-pc-windows-msvc.zip"
            "ta-${TAG}-x86_64-pc-windows-msvc.msi"
            "SHA256SUMS.txt"
          )

          MISSING=()
          for asset in "${REQUIRED[@]}"; do
            if ! echo "$ASSETS" | grep -q "\"$asset\""; then
              MISSING+=("$asset")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing release assets:"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            echo ""
            echo "Release URL: https://github.com/Trusted-Autonomy/TrustedAutonomy/releases/tag/$TAG"
            exit 1
          fi

          echo "All required assets present for $TAG:"
          for asset in "${REQUIRED[@]}"; do echo "  ✓ $asset"; done

  publish-crate:
    name: Publish to crates.io
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ta-cli to crates.io
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
            exit 0
          fi
          # Dry-run first to detect unresolvable workspace deps (not yet on crates.io).
          # Exit 0 (skip) for that case; exit 1 for any other publish error.
          DRY_OUT=$(cargo publish -p ta-cli --token "$CARGO_REGISTRY_TOKEN" --dry-run 2>&1 || true)
          if echo "$DRY_OUT" | grep -q "does not specify a version\|no matching package named"; then
            echo "crates.io publish skipped: workspace path deps not yet published to crates.io."
            echo "Publish all workspace crates in dependency order, then re-enable this step."
            exit 0
          fi
          if echo "$DRY_OUT" | grep -q "error"; then
            echo "$DRY_OUT"
            exit 1
          fi
          cargo publish -p ta-cli --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

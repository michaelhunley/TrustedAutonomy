name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release (default: false — release is marked as latest)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ta

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # macOS — build both architectures on macos-latest (ARM)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          # Linux builds (musl for static binaries)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Windows (v0.9.1)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (native)
        if: matrix.cross == false
        run: |
          cargo build --release --target ${{ matrix.target }} -p ta-cli
          cargo build --release --target ${{ matrix.target }} -p ta-daemon

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --release --target ${{ matrix.target }} -p ta-cli
          cross build --release --target ${{ matrix.target }} -p ta-daemon

      - name: Package binary with docs (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} staging/
          cp target/${{ matrix.target }}/release/ta-daemon staging/
          # Stamp the release version into USAGE.md before packaging
          if [ -f docs/USAGE.md ]; then
            sed "s/^\*\*Version\*\*:.*/**Version**: ${{ steps.get_version.outputs.version }}/" \
              docs/USAGE.md > staging/USAGE.md
          fi
          cp DISCLAIMER.md staging/ 2>/dev/null || true
          cp LICENSE staging/ 2>/dev/null || true
          cp .release-draft.md staging/RELEASE-NOTES.md 2>/dev/null || true
          mkdir -p artifacts
          cd staging
          tar czf ../artifacts/${{ env.BINARY_NAME }}-${{ steps.get_version.outputs.version }}-${{ matrix.target }}.tar.gz *

      - name: Package binary with docs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging, artifacts | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/ta-daemon.exe" staging/
          # Stamp the release version into USAGE.md before packaging
          if (Test-Path "docs/USAGE.md") {
            (Get-Content "docs/USAGE.md") -replace '^\*\*Version\*\*:.*', "**Version**: ${{ steps.get_version.outputs.version }}" |
              Set-Content "staging/USAGE.md"
          }
          foreach ($f in @("DISCLAIMER.md", "LICENSE", ".release-draft.md")) {
            if (Test-Path $f) { Copy-Item $f staging/ }
          }
          Compress-Archive -Path staging/* -DestinationPath "artifacts/${{ env.BINARY_NAME }}-${{ steps.get_version.outputs.version }}-${{ matrix.target }}.zip"

      # ── Windows MSI (v0.13.11) ────────────────────────────────────────────────
      - name: Build Windows MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        continue-on-error: true
        shell: pwsh
        env:
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          # Install cargo-wix (WiX Toolset v4 wrapper).
          cargo install cargo-wix 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "cargo-wix install failed — MSI build skipped"
            exit 0
          }

          # Extract version digits from any tag format:
          # "v0.13.12-alpha" → "0.13.12.0"
          # "public-alpha-v0.13.12" → "0.13.12.0"
          # Approach: find last occurrence of vN.N.N or N.N.N in the tag.
          $versionMatch = [regex]::Match("$env:TAG", 'v?(\d+\.\d+\.\d+)')
          if (-not $versionMatch.Success) {
            Write-Warning "Could not extract version from tag '$env:TAG' — MSI build skipped"
            exit 0
          }
          $msiVersion = $versionMatch.Groups[1].Value + ".0"
          Write-Host "MSI version: $msiVersion (from tag $env:TAG)"

          # Build the MSI using cargo-wix (sets BINARY via workspace Cargo.toml).
          cargo wix --nocapture -p ta-cli `
            --bin-path "target\x86_64-pc-windows-msvc\release" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "cargo-wix build failed — MSI skipped (non-fatal)"
            exit 0
          }

          # Find and copy the MSI to artifacts/.
          $msi = Get-ChildItem -Path target\wix -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msi) {
            $dest = "artifacts\${{ env.BINARY_NAME }}-$env:TAG-x86_64-pc-windows-msvc.msi"
            Copy-Item $msi.FullName $dest
            Write-Host "MSI created: $dest"
          } else {
            Write-Warning "cargo-wix did not produce an MSI — skipping (non-fatal)"
          }

      # ── macOS pkg + DMG (v0.13.11) ───────────────────────────────────────────
      # Build on ARM runner (aarch64-apple-darwin) — one DMG covers both arches.
      - name: Build macOS pkg and DMG
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          TAG: ${{ steps.get_version.outputs.version }}
          APPLE_DEVELOPER_CERT: ${{ secrets.APPLE_DEVELOPER_CERT }}
        run: |
          set -euo pipefail

          # Ensure create-dmg is available.
          brew install create-dmg 2>/dev/null || true

          VERSION="${TAG#v}"
          PKG_NAME="ta-${TAG}-macos"
          PKG_ROOT="pkgbuild-root"
          mkdir -p "${PKG_ROOT}/usr/local/bin"

          # Install both binaries into the pkg root.
          cp "target/${{ matrix.target }}/release/ta" "${PKG_ROOT}/usr/local/bin/"
          cp "target/${{ matrix.target }}/release/ta-daemon" "${PKG_ROOT}/usr/local/bin/"
          chmod +x "${PKG_ROOT}/usr/local/bin/ta" "${PKG_ROOT}/usr/local/bin/ta-daemon"

          # Component package.
          pkgbuild \
            --root "${PKG_ROOT}" \
            --identifier "io.trustedautonomy.ta" \
            --version "${VERSION}" \
            --install-location "/" \
            "ta-component.pkg"

          # Distribution XML for productbuild.
          cat > distribution.xml <<'DISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>Trusted Autonomy</title>
            <welcome file="welcome.html" mime-type="text/html"/>
            <options customize="never" require-scripts="false"/>
            <choices-outline>
              <line choice="default">
                <line choice="io.trustedautonomy.ta"/>
              </line>
            </choices-outline>
            <choice id="default"/>
            <choice id="io.trustedautonomy.ta" visible="false">
              <pkg-ref id="io.trustedautonomy.ta"/>
            </choice>
            <pkg-ref id="io.trustedautonomy.ta" version="${VERSION}" onConclusion="none">ta-component.pkg</pkg-ref>
          </installer-gui-script>
          DISTEOF

          # Simple welcome HTML.
          cat > welcome.html <<'EOF'
          <html><body>
          <h2>Trusted Autonomy</h2>
          <p>This package installs <code>ta</code> and <code>ta-daemon</code> to <code>/usr/local/bin/</code>.</p>
          <p>After installation, run <code>ta setup</code> to configure your agent.</p>
          </body></html>
          EOF

          # Build flat pkg.
          productbuild \
            --distribution distribution.xml \
            --package-path . \
            "${PKG_NAME}.pkg"

          # Optionally sign (if cert is present).
          if [ -n "${APPLE_DEVELOPER_CERT:-}" ]; then
            echo "Code signing not yet configured — add APPLE_DEVELOPER_CERT secret to enable."
          fi

          mkdir -p artifacts

          # Wrap in DMG.
          if command -v create-dmg >/dev/null 2>&1; then
            create-dmg \
              --volname "Trusted Autonomy ${VERSION}" \
              --window-size 520 300 \
              --icon-size 96 \
              --app-drop-link 380 150 \
              "artifacts/${PKG_NAME}.dmg" \
              "${PKG_NAME}.pkg" || {
                # create-dmg can exit non-zero on minor warnings; copy pkg directly.
                echo "create-dmg exited non-zero; copying .pkg as fallback"
                cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.dmg"
              }
          else
            echo "create-dmg not available; using raw .pkg as DMG fallback"
            cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.dmg"
          fi

          # Also ship the flat pkg alongside the DMG.
          cp "${PKG_NAME}.pkg" "artifacts/${PKG_NAME}.pkg"
          echo "macOS installer: artifacts/${PKG_NAME}.dmg"

      - name: Generate SHA256 checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS-${{ matrix.target }}.txt
          else
            shasum -a 256 * > SHA256SUMS-${{ matrix.target }}.txt
          fi

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd artifacts
          # Explicitly hash only archive files — avoids reading the checksum output file
          # (Get-FileHash * races with its own output file being written).
          $files = @(Get-ChildItem -Filter "*.zip") + @(Get-ChildItem -Filter "*.msi")
          if ($files.Count -eq 0) {
            Write-Warning "No zip/msi files found in artifacts — skipping checksum"
          } else {
            Get-FileHash $files -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)"
            } | Out-File -Encoding ascii "SHA256SUMS-${{ matrix.target }}.txt"
          }

      - name: Generate HTML docs (macOS Intel only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install pandoc
          # Use the version-stamped copy from staging/
          pandoc staging/USAGE.md -s --metadata title="Trusted Autonomy Usage Guide" \
            -c https://cdn.simplecss.org/simple.min.css \
            -o artifacts/USAGE.html
          pandoc DISCLAIMER.md -s --metadata title="Trusted Autonomy Terms of Use" \
            -c https://cdn.simplecss.org/simple.min.css \
            -o artifacts/DISCLAIMER.html
          cp staging/USAGE.md artifacts/USAGE.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: artifacts/

  # Gate job: ensures ALL platform builds pass before publishing.
  # Prevents partial releases with missing platform binaries.
  release-gate:
    name: Release Gate (all platforms must pass)
    needs: build-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds succeeded
        run: |
          if [ "${{ needs.build-release.result }}" != "success" ]; then
            echo "One or more platform builds failed. Blocking release."
            echo "Build result: ${{ needs.build-release.result }}"
            exit 1
          fi
          echo "All platform builds passed. Proceeding to publish."

  publish-release:
    name: Publish Release
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd artifacts
          cat SHA256SUMS-*.txt > SHA256SUMS.txt
          rm -f SHA256SUMS-*.txt

      - name: Build release body
        id: release_body
        run: |
          # Start with release notes if .release-draft.md was committed
          BODY=""
          if [ -f .release-draft.md ]; then
            BODY="$(cat .release-draft.md)"
            BODY="${BODY}

          ---

          "
          fi

          TAG="${{ steps.get_version.outputs.version }}"

          # Append installation instructions
          BODY="${BODY}### Installation

          **macOS** (recommended)
          Download \`ta-${TAG}-macos.dmg\` below, open it, and run the installer. TA installs to \`/usr/local/bin/ta\`.

          **Windows** (recommended)
          Download \`ta-${TAG}-x86_64-pc-windows-msvc.msi\` below and run it. TA installs to \`%ProgramFiles%\\TrustedAutonomy\\\` and adds itself to PATH. Alternatively, use the \`.zip\` for manual installation.

          **Linux**
          \`\`\`bash
          # x86_64
          curl -L https://github.com/Trusted-Autonomy/TrustedAutonomy/releases/download/${TAG}/ta-${TAG}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv ta /usr/local/bin/
          \`\`\`

          **Cargo**
          \`\`\`bash
          cargo install ta-cli
          \`\`\`

          **Nix**
          \`\`\`bash
          nix run github:trustedautonomy/ta
          \`\`\`

          On first run, \`ta\` will prompt you to review and accept the terms of use.

          ### Documentation

          - [USAGE.md](https://github.com/trustedautonomy/ta/blob/main/docs/USAGE.md) — Complete usage guide
          - [DISCLAIMER.md](https://github.com/trustedautonomy/ta/blob/main/DISCLAIMER.md) — Terms of use"

          # Write to file for the release action (handles multiline safely)
          echo "$BODY" > release-body.md

      - name: Validate artifacts before publish
        env:
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          # Verify all platform archives exist locally before touching GitHub.
          # This catches missing builds before we create any release object.
          REQUIRED=(
            "ta-${TAG}-aarch64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-aarch64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-x86_64-pc-windows-msvc.zip"
            "SHA256SUMS.txt"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "artifacts/$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing build artifacts (upload step failed?):"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            exit 1
          fi
          echo "All ${#REQUIRED[@]} required artifacts present locally."

          # Report optional installers (non-fatal if absent).
          OPTIONAL=(
            "ta-${TAG}-macos.dmg"
            "ta-${TAG}-x86_64-pc-windows-msvc.msi"
          )
          for f in "${OPTIONAL[@]}"; do
            if [ -f "artifacts/$f" ]; then
              echo "  ✓ optional: $f"
            else
              echo "  (skipped): $f — not present (installer build may have been skipped)"
            fi
          done

      - name: Publish GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
          files: artifacts/*
          body_path: release-body.md
          make_latest: true

      - name: Validate release assets on GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_version.outputs.version }}
        run: |
          echo "Waiting for asset propagation..."
          sleep 5
          ASSETS=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          echo "Attached assets: $ASSETS"

          REQUIRED=(
            "ta-${TAG}-aarch64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-apple-darwin.tar.gz"
            "ta-${TAG}-x86_64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-aarch64-unknown-linux-musl.tar.gz"
            "ta-${TAG}-x86_64-pc-windows-msvc.zip"
            "SHA256SUMS.txt"
          )

          MISSING=()
          for asset in "${REQUIRED[@]}"; do
            if ! echo "$ASSETS" | grep -q "\"$asset\""; then
              MISSING+=("$asset")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing release assets:"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            echo ""
            echo "Release URL: https://github.com/Trusted-Autonomy/TrustedAutonomy/releases/tag/$TAG"
            exit 1
          fi

          echo "All required assets present for $TAG:"
          for asset in "${REQUIRED[@]}"; do echo "  ✓ $asset"; done

  publish-crate:
    name: Publish to crates.io
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ta-cli to crates.io
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            cargo publish -p ta-cli --token "$CARGO_REGISTRY_TOKEN"
          else
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

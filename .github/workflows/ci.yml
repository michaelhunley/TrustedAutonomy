name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml, CLAUDE.md, and .release.toml agree on version
        run: |
          # Cargo.toml is the single source of truth for semver.
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          # CLAUDE.md must echo it for agent context.
          CLAUDE_VER=$(grep 'Current version' CLAUDE.md | head -1 | sed "s/.*\`\(.*\)\`.*/\1/")

          # .release.toml must not be present with a stale version comment.
          # (It doesn't store version directly — Cargo.toml is authoritative — so we
          # just verify the two human-editable files agree with each other.)

          echo "Cargo.toml version : $CARGO_VER"
          echo "CLAUDE.md version  : $CLAUDE_VER"

          if [ "$CARGO_VER" != "$CLAUDE_VER" ]; then
            echo ""
            echo "ERROR: Version mismatch."
            echo "  Cargo.toml says: $CARGO_VER"
            echo "  CLAUDE.md says:  $CLAUDE_VER"
            echo ""
            echo "Fix: run ./scripts/bump-version.sh $CARGO_VER"
            echo "  or update CLAUDE.md manually to match Cargo.toml."
            exit 1
          fi
          echo "OK: versions consistent ($CARGO_VER)"

  lint-and-test:
    name: Lint and Test
    needs: version-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build all crates
        run: nix develop --command bash -c "cargo build --workspace --all-targets"
        timeout-minutes: 30

      - name: Run tests
        run: nix develop --command bash -c "cargo test --workspace"
        timeout-minutes: 15

      - name: Run clippy
        run: nix develop --command bash -c "cargo clippy --workspace --all-targets -- -D warnings"
        timeout-minutes: 15

      - name: Check formatting
        run: nix develop --command bash -c "cargo fmt --all -- --check"
        timeout-minutes: 5

      - name: Build ta-cli binary
        run: nix develop --command bash -c "cargo build --release -p ta-cli"
        timeout-minutes: 30

      - name: Test ta-cli --version
        run: nix develop --command bash -c "./target/release/ta --version"
        timeout-minutes: 5

  # Windows build verification (v0.9.1)
  windows-build:
    name: Windows Build
    needs: version-check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build all crates
        run: cargo build --workspace --all-targets
        timeout-minutes: 30

      - name: Run tests
        run: cargo test --workspace
        timeout-minutes: 15

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        timeout-minutes: 15

      - name: Build ta-cli binary
        run: cargo build --release -p ta-cli
        timeout-minutes: 30

      - name: Test ta-cli --version
        run: target\release\ta.exe --version
        timeout-minutes: 5

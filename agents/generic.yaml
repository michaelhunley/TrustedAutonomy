# Template for adding a custom agent to Trusted Autonomy.
#
# Copy this file to one of:
#   .ta/agents/<agent-name>.yaml      (project-specific override)
#   ~/.config/ta/agents/<agent-name>.yaml  (user-wide override)
#
# Then use: ta run "task" --agent <agent-name> --source .
#
# TA searches for agent configs in this order:
#   1. .ta/agents/<agent-name>.yaml       (project override)
#   2. ~/.config/ta/agents/<agent-name>.yaml  (user override)
#   3. <ta-install>/agents/<agent-name>.yaml  (built-in defaults)
#   4. Hard-coded fallback (launches command with no args)
#
# === Quick Setup Q&A ===
# Answer these questions to configure your agent:
#
# Q1: What command runs your agent? (must be on PATH or absolute path)
#     → Set `command` below
#
# Q2: What arguments does it need? Use {prompt} where TA should inject the goal text.
#     → Set `args_template` below
#
# Q3: Does your agent read CLAUDE.md for instructions?
#     → Set `injects_context_file: true` if yes
#
# Q4: Does your agent support .claude/settings.local.json permissions?
#     → Set `injects_settings: true` if yes (Claude Code-compatible agents only)
#
# Q5: Does your agent need an initialization step before running?
#     → Set `pre_launch` with the init command if yes
#
# === Contributing ===
# To add your framework to TA's built-in registry:
# 1. Add an entry to `frameworks.toml` (see PLAN.md v0.7.7 for format)
# 2. Create an agent config YAML in `agents/`
# 3. Open a PR — community configs are tagged with `community: true`

name: my-agent
description: "Description of what this agent does"

# Q1: The command to execute (must be on PATH or absolute path).
command: my-agent-cli

# Q2: Arguments passed to the command. Use {prompt} as a placeholder —
# TA replaces it with the goal title + objective text.
args_template:
  - "{prompt}"

# Q3: If true, TA injects goal context into CLAUDE.md before launch.
# Enable for agents that read CLAUDE.md for instructions.
injects_context_file: false

# Q4: If true, TA injects .claude/settings.local.json with permissions.
# Enable for Claude Code-compatible agents.
injects_settings: false

# Q5: Optional command to run before the main agent launch.
# Set to null if no pre-launch step is needed.
pre_launch: null
# Example:
# pre_launch:
#   command: my-agent-cli
#   args: ["init", "--workspace"]

# Environment variables to set for the agent process.
env: {}
# Example:
# env:
#   MY_AGENT_MODE: "autonomous"
#   MY_AGENT_LOG_LEVEL: "info"

# Agent alignment profile (v0.4.0).
# Compiled into CapabilityManifest grants by the Policy Compiler.
# These are enforced constraints, not self-declared promises.
#
# alignment:
#   principal: "project-owner"           # Who this agent serves
#   autonomy_envelope:
#     bounded_actions:                   # Actions the agent CAN perform
#       - "fs_read"
#       - "fs_write"
#       - "exec: cargo test"
#     escalation_triggers:               # Conditions that require human approval
#       - "new_dependency"
#       - "security_sensitive"
#     forbidden_actions:                 # Actions the agent MUST NEVER perform
#       - "network_external"
#       - "credential_access"
#   constitution: "default-v1"           # Enforcement rules template
#   coordination:                        # Multi-agent collaboration rules
#     allowed_collaborators:
#       - "claude-code"
#     shared_resources:
#       - "src/**"

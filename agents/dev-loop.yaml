# Dev Loop — Orchestration agent config for `ta dev`.
#
# This agent coordinates the development loop: reads the plan, suggests next
# goals, launches implementation agents, handles draft review, and manages
# releases. It does NOT write code directly.
#
# SECURITY: The orchestrator is restricted to read-only project access + TA MCP
# tools. No filesystem writes, no shell access, no outbound HTTP POST/PUT/DELETE.
# Implementation happens in sub-goals with their own staging workspaces.
#
# Reusable by any channel (Slack, web app, etc.) via the ChannelRegistry.
# `ta dev` is the convenience CLI entry point.

name: dev-loop
description: "Interactive development loop orchestrator — read-only project access + TA MCP tools only"
command: claude
args_template:
  - "--allowedTools"
  # TA MCP tools (via ta serve MCP server):
  #   ta_plan   — read/update plan status
  #   ta_goal   — start sub-goals, check status
  #   ta_draft  — list/view/approve/deny drafts
  #   ta_context — search project memory
  #   ta_release — run release pipeline
  # Read-only builtins (no Write, Edit, Bash, NotebookEdit):
  #   Read      — read file contents
  #   Grep      — search file contents
  #   Glob      — find files by pattern
  #   WebFetch  — fetch web pages (GET only, read documentation)
  #   WebSearch — search the web
  - "mcp__ta__ta_plan,mcp__ta__ta_goal,mcp__ta__ta_draft,mcp__ta__ta_context,mcp__ta__ta_release,Read,Grep,Glob,WebFetch,WebSearch"
  - "--system-prompt"
  - "{prompt}"
injects_context_file: false
injects_settings: false
pre_launch: null
env: {}

# The dev-loop agent is an orchestrator — it reads the project but does not
# write files directly. Implementation happens in sub-goals with their own
# staging workspaces.
alignment:
  principal: "project-owner"
  autonomy_envelope:
    bounded_actions:
      - "fs_read"
      - "plan_read"
      - "plan_update"
      - "goal_start"
      - "draft_review"
      - "release_run"
      - "context_read"
    escalation_triggers:
      - "goal_start"
      - "release_run"
    forbidden_actions:
      - "fs_write_patch"       # No writing files
      - "fs_apply"             # No applying changes
      - "shell_execute"        # No shell/Bash access
      - "network_external"     # No outbound network (POST, PUT, DELETE)
      - "credential_access"    # No reading secrets
      - "notebook_edit"        # No notebook modification
  constitution: "default-v1"
  coordination:
    allowed_collaborators:
      - "claude-code"
      - "codex"
      - "claude-flow"
    shared_resources:
      - "PLAN.md"
      - ".ta/**"

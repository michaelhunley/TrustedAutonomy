[workspace]

[package]
name = "ta-memory-supermemory"
version = "0.1.0"
edition = "2021"
description = "Supermemory cloud memory backend plugin for Trusted Autonomy — JSON-over-stdio"
license = "Apache-2.0"

[[bin]]
name = "ta-memory-supermemory"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

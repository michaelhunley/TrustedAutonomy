[workspace]

[package]
name = "ta-messaging-gmail"
version = "0.1.0"
edition = "2021"
description = "Gmail messaging adapter plugin for Trusted Autonomy — fetch and draft via Gmail REST API (OAuth2)"
license = "Apache-2.0"

[[bin]]
name = "ta-messaging-gmail"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }
base64 = "0.22"

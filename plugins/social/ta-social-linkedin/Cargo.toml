[workspace]

[package]
name = "ta-social-linkedin"
version = "0.1.0"
edition = "2021"
description = "LinkedIn social media adapter plugin for Trusted Autonomy — create drafts and schedule posts via LinkedIn API (OAuth2)"
license = "Apache-2.0"

[[bin]]
name = "ta-social-linkedin"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }

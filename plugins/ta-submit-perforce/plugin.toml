name = "perforce"
version = "0.1.0"
type = "vcs"
command = "ta-submit-perforce"
protocol = "json-stdio"
capabilities = ["commit", "push", "review", "sync", "save_state", "check_review", "merge_review", "protected_targets"]
description = "Perforce / Helix Core VCS adapter — changelist-based workflow with Helix Swarm review support"
timeout_secs = 60

# Installation:
# 1. Build: cargo build --release
# 2. Copy binary to PATH or to .ta/plugins/vcs/perforce/
# 3. Copy this plugin.toml to .ta/plugins/vcs/perforce/
# 4. Set submit.adapter = "perforce" in .ta/workflow.toml
#
# Environment variables (optional):
#   P4PORT  — Perforce server address (e.g., ssl:perforce:1666)
#   P4USER  — Perforce username
#   P4CLIENT — Perforce client workspace name

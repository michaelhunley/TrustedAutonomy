[workspace]

[package]
name = "ta-submit-svn"
version = "0.1.0"
edition = "2021"
description = "Subversion (SVN) VCS adapter plugin for Trusted Autonomy — external JSON-over-stdio plugin"
license = "Apache-2.0"

[[bin]]
name = "ta-submit-svn"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

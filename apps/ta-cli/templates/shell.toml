# TA Shell routing configuration.
#
# Routes: map input prefixes to command executors.
# If the user types "ta draft list", the shell sends it to the daemon's
# command executor. Anything not matching a route goes to the agent.
#
# Shortcuts: single-word aliases that expand before routing.

[[routes]]
prefix = "ta "
command = "ta"
strip_prefix = true

[[routes]]
prefix = "git "
command = "git"
strip_prefix = true

[[routes]]
prefix = "vcs "
command = "git"
strip_prefix = true

[[routes]]
prefix = "!"
command = "sh"
args = ["-c"]
strip_prefix = true

[[shortcuts]]
match = "approve"
expand = "ta draft approve"

[[shortcuts]]
match = "deny"
expand = "ta draft deny"

[[shortcuts]]
match = "view"
expand = "ta draft view"

[[shortcuts]]
match = "apply"
expand = "ta draft apply"

[[shortcuts]]
match = "status"
expand = "ta status"

[[shortcuts]]
match = "plan"
expand = "ta plan list"

[[shortcuts]]
match = "goals"
expand = "ta goal list"

[[shortcuts]]
match = "drafts"
expand = "ta draft list"
